<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOP — Market Opportunity Process — Medit</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #f7f8fa;
            --card-bg: #ffffff;
            --border: #e0e3e8;
            --text: #1a1a1a;
            --text-secondary: #333333;
            --text-muted: #666666;
            --blue: #0274be;
            --blue-hover: #025a96;
            --amber: #f59e0b;
            --green: #22a861;
        }
        body { background: #f7f8fa; color: var(--text-secondary); font-family: 'Roboto', sans-serif; min-height: 100vh; }
        .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 60px 24px 40px; }
        header { text-align: center; margin-bottom: 64px; animation: fadeDown 0.8s ease-out; }
        .logo-mark { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 24px; }
        .logo-icon { width: 44px; height: 44px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Roboto', sans-serif; font-weight: 700; font-size: 1.2rem; color: #fff; }
        .logo-text { font-family: 'Roboto', sans-serif; font-size: 1rem; font-weight: 600; color: var(--blue); letter-spacing: 3px; text-transform: uppercase; }
        header h1 { font-family: 'Roboto', sans-serif; font-size: 3rem; font-weight: 700; line-height: 1.15; margin-bottom: 16px; color: #1a1a1a; }
        header p { color: var(--text-muted); font-size: 1.1rem; max-width: 560px; margin: 0 auto; line-height: 1.7; }
        .lang-toggle { position: fixed; top: 20px; right: 24px; z-index: 200; display: flex; background: var(--card-bg); border: 1px solid #e0e3e8; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .lang-btn { padding: 7px 14px; font-family: 'Roboto', sans-serif; font-size: 0.78rem; font-weight: 600; border: none; background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.25s ease; }
        .lang-btn.active { background: var(--blue); color: white; }
        .process-flow { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 56px; animation: fadeDown 0.8s ease-out 0.15s backwards; flex-wrap: wrap; }
        .flow-step { display: flex; align-items: center; gap: 8px; background: var(--card-bg); border: 1px solid #e0e3e8; border-radius: 8px; padding: 8px 16px; font-family: 'Roboto', sans-serif; font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .flow-step .step-num { background: var(--blue); color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }
        .flow-arrow { color: #e0e3e8; font-size: 1.2rem; }
        .cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-bottom: 56px; }
        .card { background: var(--card-bg); border: 1px solid #e0e3e8; border-radius: 8px; padding: 32px 28px 28px; color: var(--text-secondary); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: 8px 8px 0 0; transition: height 0.4s ease; }
        .card:nth-child(1)::before { background: var(--blue); }
        .card:nth-child(2)::before { background: var(--blue); }
        .card:nth-child(3)::before { background: #f59e0b; }
        .card:nth-child(4)::before { background: var(--green); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .card:hover::before { height: 5px; }
        .card:nth-child(1) { animation: fadeUp 0.7s ease-out 0.2s backwards; }
        .card:nth-child(2) { animation: fadeUp 0.7s ease-out 0.3s backwards; }
        .card:nth-child(3) { animation: fadeUp 0.7s ease-out 0.4s backwards; }
        .card:nth-child(4) { animation: fadeUp 0.7s ease-out 0.5s backwards; }
        .card-step { font-family: 'Roboto', sans-serif; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
        .card:nth-child(1) .card-step { color: var(--blue); }
        .card:nth-child(2) .card-step { color: var(--blue); }
        .card:nth-child(3) .card-step { color: #f59e0b; }
        .card:nth-child(4) .card-step { color: var(--green); }
        .card-icon { width: 48px; height: 48px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 1.3rem; }
        .card:nth-child(1) .card-icon { background: rgba(2,116,190,0.1); }
        .card:nth-child(2) .card-icon { background: rgba(2,116,190,0.1); }
        .card:nth-child(3) .card-icon { background: rgba(245,158,11,0.1); }
        .card:nth-child(4) .card-icon { background: rgba(34,168,97,0.1); }
        .card h2 { font-family: 'Roboto', sans-serif; font-size: 1.35rem; font-weight: 700; margin-bottom: 10px; color: #1a1a1a; }
        .card p { color: var(--text-muted); font-size: 0.92rem; line-height: 1.6; margin-bottom: 20px; }
        .card-link { font-family: 'Roboto', sans-serif; font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: gap 0.3s ease; }
        .card:nth-child(1) .card-link { color: var(--blue); }
        .card:nth-child(2) .card-link { color: var(--blue); }
        .card:nth-child(3) .card-link { color: #f59e0b; }
        .card:nth-child(4) .card-link { color: var(--green); }
        .card:hover .card-link { gap: 10px; }
        footer { text-align: center; padding: 32px 0; border-top: 1px solid #e0e3e8; animation: fadeUp 0.7s ease-out 0.6s backwards; }
        footer p { color: var(--text-muted); font-size: 0.85rem; line-height: 1.8; }
        footer strong { color: #1a1a1a; font-family: 'Roboto', sans-serif; font-weight: 700; }
        #iframe-view { display: none; position: fixed; inset: 0; z-index: 100; background: #f7f8fa; flex-direction: column; }
        #iframe-view.active { display: flex; }
        .iframe-topbar { background: var(--card-bg); border-bottom: 1px solid #e0e3e8; padding: 10px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
        .back-btn { font-family: 'Roboto', sans-serif; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); background: var(--card-bg); border: 1px solid #e0e3e8; padding: 7px 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .back-btn:hover { border-color: var(--blue); color: var(--blue); }
        .iframe-title { font-family: 'Roboto', sans-serif; font-size: 0.9rem; font-weight: 600; color: #1a1a1a; }
        .iframe-badge { font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; }
        #tool-iframe { flex: 1; width: 100%; border: none; background: #fff; }
        @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .process-flow { flex-wrap: wrap; } .cards { grid-template-columns: 1fr; } header h1 { font-size: 2.2rem; } }
    </style>
</head>
<body>
    <div class="lang-toggle" id="langToggle">
        <button class="lang-btn active" id="langEn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" id="langKo" onclick="setLang('ko')">한국어</button>
    </div>
    <div id="gateway-view">
        <div class="container">
            <header>
                <div class="logo-mark"><div class="logo-icon">M</div><span class="logo-text">Medit</span></div>
                <h1>Market Opportunity Process</h1>
                <p id="headerDesc"></p>
            </header>
            <div class="process-flow">
                <div class="flow-step"><span class="step-num">1</span> Submit</div><span class="flow-arrow">→</span>
                <div class="flow-step"><span class="step-num">2</span> Score</div><span class="flow-arrow">→</span>
                <div class="flow-step"><span class="step-num">3</span> Initiate</div><span class="flow-arrow">→</span>
                <div class="flow-step"><span class="step-num">4</span> Commercialize</div>
            </div>
            <div class="cards">
                <div class="card" onclick="openTool('submission','MOP Submission Form','Step 1','#0274be')">
                    <div class="card-step">Step 1</div><div class="card-icon">📝</div>
                    <h2>MOP Submission Form</h2><p id="card1Desc"></p><span class="card-link" id="card1Link"></span>
                </div>
                <div class="card" onclick="openToolWithSync('scoring','MOP Scoring Tool','Step 2','#0274be')">
                    <div class="card-step">Step 2</div><div class="card-icon">📊</div>
                    <h2>MOP Scoring Tool</h2><p id="card2Desc"></p><span class="card-link" id="card2Link"></span>
                </div>
                <div class="card" onclick="openTool('afi','AFI Package','Step 3','#f59e0b')">
                    <div class="card-step">Step 3</div><div class="card-icon">📋</div>
                    <h2>AFI Package</h2><p id="card3Desc"></p><span class="card-link" id="card3Link"></span>
                </div>
                <div class="card" onclick="openTool('afc','AFC Readiness Checklist','Step 4','#22a861')">
                    <div class="card-step">Step 4</div><div class="card-icon">✅</div>
                    <h2>AFC Readiness Checklist</h2><p id="card4Desc"></p><span class="card-link" id="card4Link"></span>
                </div>
            </div>
            <div id="adminPanel" style="display:none;">
                <div style="background:#ffffff; border:1px solid #e0e3e8; border-radius:16px; padding:32px; margin-bottom:56px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28px;">
                        <div><h2 style="font-family:'Roboto',sans-serif; font-size:1.4rem; font-weight:700; margin:0;">Submissions</h2>
                        <p style="color:#666666; font-size:0.85rem; margin-top:4px;" id="adminSubCount"></p></div>
                        <div style="display:flex; gap:12px;">
                            <button onclick="toggleStats()" style="background:#0274be;border:none;color:#ffffff;padding:8px 18px;border-radius:8px;cursor:pointer;font-family:'Roboto',sans-serif;font-size:0.85rem;font-weight:600;">Statistics</button>
                            <button onclick="closeAdmin()" style="background:none; border:1px solid #e0e3e8; color:#333333; padding:8px 18px; border-radius:8px; cursor:pointer; font-family:'Roboto',sans-serif; font-size:0.85rem; font-weight:600;">Close</button>
                        </div>
                    </div>
                    <div id="statsPanel" style="display:none;margin-bottom:24px;"></div>
                    <div id="submissionsList"></div>
                </div>
            </div>
            <footer>
                <p><strong>Market Opportunity Process — Medit</strong></p>
                <p id="footerDesc"></p>
                <p style="margin-top:14px;"><a href="#" onclick="openAdmin(event)" style="color:#666666; font-size:0.8rem; text-decoration:none; opacity:0.45;">Admin</a></p>
            </footer>
        </div>
    </div>
    <div id="iframe-view">
        <div class="iframe-topbar">
            <button class="back-btn" onclick="closeTool()">← Back</button>
            <span class="iframe-badge" id="iframeBadge"></span>
            <span class="iframe-title" id="iframeTitle"></span>
        </div>
        <iframe id="tool-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>
    <script>
    // Tool file mapping - direct file references (all files in same folder)
    var toolFiles = {
        submission: 'MOP_Submission_Form.html',
        scoring: 'MOP_Scoring_Tool.html',
        afi: 'AFI_Package.html',
        afc: 'AFC_Readiness_Checklist.html'
    };

    function openTool(key, title, step, color) {
        var file = toolFiles[key];
        if (!file) { alert('Tool not found: ' + key); return; }
        document.getElementById('tool-iframe').src = file;
        document.getElementById('iframeTitle').textContent = title;
        var badge = document.getElementById('iframeBadge');
        badge.textContent = step;
        badge.style.background = color + '22';
        badge.style.color = color;
        document.getElementById('gateway-view').style.display = 'none';
        document.getElementById('langToggle').style.display = 'none';
        document.getElementById('iframe-view').classList.add('active');
    }

    function closeTool() {
        document.getElementById('iframe-view').classList.remove('active');
        document.getElementById('tool-iframe').src = '';
        document.getElementById('gateway-view').style.display = '';
        document.getElementById('langToggle').style.display = '';
    }

    // openToolWithSync - opens scoring tool and syncs submission data
    function openToolWithSync(key, title, step, color) {
        openTool(key, title, step, color);
        // After opening scoring tool, sync submissions
        if (key === 'scoring' && mopSubmissions.length > 0) {
            setTimeout(function() {
                var iframe = document.getElementById('tool-iframe');
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({
                        type: 'mop-submissions-sync',
                        payload: mopSubmissions
                    }, '*');
                }
            }, 1500);
        }
    }

    // Language
    var i18n = {
        en: {
            headerDesc: 'A structured process to evaluate market opportunities and drive them to execution.',
            card1Desc: 'Propose a market opportunity. Describe the customer problem, strategic fit, growth impact, and supporting evidence.',
            card1Link: 'Create Submission →',
            card2Desc: 'Evaluate submitted opportunities across 8 weighted criteria including strategic alignment, market size, and customer impact.',
            card2Link: 'Start Scoring →',
            card3Desc: 'Approval for Initiation. Build the solution concept, market analysis, and business case for opportunities that pass scoring.',
            card3Link: 'Open AFI Package →',
            card4Desc: 'Approval for Commercialization. Verify readiness across product, regulatory, sales, marketing, and support before launch.',
            card4Link: 'Open Checklist →',
            footerDesc: 'MOP manages the full lifecycle from opportunity discovery through commercialization.'
        },
        ko: {
            headerDesc: '시장 기회를 체계적으로 평가하고 실행으로 연결하는 MOP 프로세스입니다.',
            card1Desc: '시장 기회를 제안합니다. 고객 문제, 전략적 적합성, 성장 영향 등을 기술하여 제출합니다.',
            card1Link: '제안서 작성하기 →',
            card2Desc: '제출된 기회를 8개 기준으로 평가합니다. 전략 적합성, 시장 규모, 고객 영향도 등을 점수화합니다.',
            card2Link: '평가 시작하기 →',
            card3Desc: '착수 승인 패키지. 점수를 통과한 기회에 대해 솔루션 컨셉, 시장 분석 및 비즈니스 케이스를 작성합니다.',
            card3Link: 'AFI 패키지 열기 →',
            card4Desc: '상용화 승인 체크리스트. 출시 전 제품, 규제, 영업, 마케팅, 지원 전반의 준비 상태를 확인합니다.',
            card4Link: '체크리스트 열기 →',
            footerDesc: 'MOP는 시장 기회 발굴부터 상용화까지의 전 과정을 체계적으로 관리합니다.'
        }
    };

    function setLang(lang) {
        var t = i18n[lang];
        document.getElementById('headerDesc').textContent = t.headerDesc;
        document.getElementById('card1Desc').textContent = t.card1Desc;
        document.getElementById('card1Link').textContent = t.card1Link;
        document.getElementById('card2Desc').textContent = t.card2Desc;
        document.getElementById('card2Link').textContent = t.card2Link;
        document.getElementById('card3Desc').textContent = t.card3Desc;
        document.getElementById('card3Link').textContent = t.card3Link;
        document.getElementById('card4Desc').textContent = t.card4Desc;
        document.getElementById('card4Link').textContent = t.card4Link;
        document.getElementById('footerDesc').textContent = t.footerDesc;
        document.getElementById('langEn').classList.toggle('active', lang === 'en');
        document.getElementById('langKo').classList.toggle('active', lang === 'ko');
    }
    setLang('en');

    // Admin
    function openAdmin(e) {
        e.preventDefault();
        var pw = prompt('Enter admin password:');
        if (pw !== 'medit1234') { if (pw !== null) alert('Incorrect password.'); return; }
        renderSubmissions();
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminPanel').scrollIntoView({ behavior: 'smooth' });
    }
    function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
    function renderSubmissions() {
        var keys = [];
        try { for (var i = 0; i < localStorage.length; i++) { var k = localStorage.key(i); if (k.indexOf('mop_submission_') === 0) keys.push(k); } } catch(e) {}
        keys.sort().reverse();
        var box = document.getElementById('submissionsList');
        document.getElementById('adminSubCount').textContent = keys.length + ' submission(s)';
        if (keys.length === 0) { box.innerHTML = '<p style="color:#666666; text-align:center; padding:48px 0;">No submissions yet.</p>'; return; }
        var h = '';
        keys.forEach(function(key, idx) {
            try {
                var item = JSON.parse(localStorage.getItem(key)), d = item.data;
                var date = new Date(item.timestamp).toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
                var cx = (d.initialComplexity||'N/A').toUpperCase();
                var cc = cx==='HIGH'?'#0274be':cx==='MEDIUM'?'#f59e0b':cx==='LOW'?'#22a861':'#999';
                h += '<div style="background:#f7f8fa;border:1px solid #e0e3e8;border-radius:12px;margin-bottom:10px;overflow:hidden">';
                h += '<div onclick="toggleDetail('+idx+')" style="padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:14px">';
                h += '<span style="color:#666666;font-size:0.8rem;font-weight:600;min-width:24px">'+(idx+1)+'</span>';
                h += '<span style="color:#1a1a1a;font-family:Roboto,sans-serif;font-weight:600;flex:1;font-size:0.95rem">'+(d.opportunityTitle||'Untitled')+'</span>';
                h += '<span style="background:'+cc+'18;color:'+cc+';padding:3px 10px;border-radius:4px;font-size:0.72rem;font-weight:700">'+cx+'</span>';
                h += '<span style="color:#666666;font-size:0.78rem;white-space:nowrap">'+date+'</span>';
                h += '<span id="arrow-'+idx+'" style="color:#666666;font-size:0.65rem;transition:transform 0.3s">▼</span></div>';
                h += '<div id="detail-'+idx+'" style="display:none;padding:0 20px 24px 58px;border-top:1px solid #e0e3e8"><table style="width:100%;border-collapse:collapse;margin-top:16px">';
                h += sr('Request Type',d.requestType)+sr('Request Owner',d.requestOwner)+sr('Target Customer',d.targetCustomer);
                h += br('OPPORTUNITY SUMMARY',d.opportunitySummary)+br('PROBLEM BEING SOLVED',d.problemBeingSolved);
                h += br('STRATEGIC RELEVANCE',d.strategicRelevance)+br('GROWTH IMPACT',d.growthImpact);
                h += br('EVIDENCE',d.evidence)+br('PRIORITY ARGUMENT',d.priorityArgument);
                if(d.visibleDependencies) h += br('DEPENDENCIES',d.visibleDependencies);
                h += '</table><div style="margin-top:20px;text-align:right"><button onclick="delSub(\''+key+'\')" style="background:none;border:1px solid rgba(2,116,190,0.25);color:#0274be;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:0.8rem;font-family:Roboto,sans-serif;font-weight:600">Delete</button></div></div></div>';
            } catch(e){}
        });
        box.innerHTML = h;
    }
    function sr(l,v){return '<tr><td style="color:#666666;padding:6px 16px 6px 0;vertical-align:top;width:160px;font-size:0.82rem">'+l+'</td><td style="color:#1a1a1a;padding:6px 0;font-size:0.85rem">'+(v||'-')+'</td></tr>';}
    function br(l,v){return '<tr><td colspan="2" style="padding:14px 0 4px;color:#0274be;font-weight:700;font-size:0.75rem;letter-spacing:0.5px">'+l+'</td></tr><tr><td colspan="2" style="color:#333;padding:2px 0 8px;font-size:0.85rem;line-height:1.65">'+(v||'-')+'</td></tr>';}
    function toggleDetail(i){var d=document.getElementById('detail-'+i),a=document.getElementById('arrow-'+i);if(d.style.display==='none'){d.style.display='block';a.style.transform='rotate(180deg)';}else{d.style.display='none';a.style.transform='rotate(0deg)';}}
    function delSub(k){if(!confirm('Delete?'))return;try{localStorage.removeItem(k);}catch(e){}renderSubmissions();}

    // Statistics
    function toggleStats() {
        var panel = document.getElementById('statsPanel');
        if (panel.style.display === 'none') {
            renderStats();
            panel.style.display = 'block';
        } else {
            panel.style.display = 'none';
        }
    }

    function renderStats() {
        var keys = [];
        try { for (var i = 0; i < localStorage.length; i++) { var k = localStorage.key(i); if (k.indexOf('mop_submission_') === 0) keys.push(k); } } catch(e) {}
        var total = keys.length;
        var now = new Date();
        var sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
        var requestTypes = {};
        var complexityMap = { 'LOW': 0, 'MEDIUM': 0, 'HIGH': 0, 'UNKNOWN': 0 };
        var recentCount = 0;
        var customers = {};
        keys.forEach(function(key) {
            try {
                var item = JSON.parse(localStorage.getItem(key));
                var d = item.data;
                var rt = d.requestType || 'Unknown';
                requestTypes[rt] = (requestTypes[rt] || 0) + 1;
                var cx = (d.initialComplexity || 'UNKNOWN').toUpperCase();
                if (complexityMap.hasOwnProperty(cx)) { complexityMap[cx]++; } else { complexityMap['UNKNOWN']++; }
                var ts = new Date(item.timestamp);
                if (ts >= sevenDaysAgo) recentCount++;
                var tc = d.targetCustomer || 'Unknown';
                customers[tc] = (customers[tc] || 0) + 1;
            } catch(e) {}
        });
        var topCustomers = Object.keys(customers).sort(function(a, b) { return customers[b] - customers[a]; }).slice(0, 3);
        var html = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px">';
        html += '<div style="background:#ffffff;border:1px solid #e0e3e8;border-radius:12px;padding:20px">';
        html += '<p style="color:#666666;font-size:0.8rem;margin:0 0 8px 0;font-weight:600">TOTAL SUBMISSIONS</p>';
        html += '<div style="font-size:2.5rem;font-weight:700;color:#0274be;margin:0">'+total+'</div></div>';
        html += '<div style="background:#ffffff;border:1px solid #e0e3e8;border-radius:12px;padding:20px">';
        html += '<p style="color:#666666;font-size:0.8rem;margin:0 0 12px 0;font-weight:600">BY REQUEST TYPE</p>';
        Object.keys(requestTypes).forEach(function(type) {
            html += '<div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.9rem">';
            html += '<span style="color:#1a1a1a">'+type+'</span>';
            html += '<span style="color:#0274be;font-weight:600">'+requestTypes[type]+'</span></div>';
        });
        html += '</div>';
        html += '<div style="background:#ffffff;border:1px solid #e0e3e8;border-radius:12px;padding:20px">';
        html += '<p style="color:#666666;font-size:0.8rem;margin:0 0 12px 0;font-weight:600">BY COMPLEXITY</p>';
        ['HIGH','MEDIUM','LOW','UNKNOWN'].forEach(function(cx) {
            var color = cx==='HIGH'?'#0274be':cx==='MEDIUM'?'#f59e0b':cx==='LOW'?'#22a861':'#999';
            html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:0.9rem">';
            html += '<span style="color:#1a1a1a">'+cx+'</span>';
            html += '<span style="background:'+color+'18;color:'+color+';padding:3px 10px;border-radius:4px;font-size:0.8rem;font-weight:700">'+complexityMap[cx]+'</span></div>';
        });
        html += '</div>';
        var olderCount = total - recentCount;
        html += '<div style="background:#ffffff;border:1px solid #e0e3e8;border-radius:12px;padding:20px">';
        html += '<p style="color:#666666;font-size:0.8rem;margin:0 0 12px 0;font-weight:600">SUBMISSION TIMELINE</p>';
        html += '<div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.9rem"><span style="color:#1a1a1a">Last 7 days</span><span style="color:#0274be;font-weight:600">'+recentCount+'</span></div>';
        html += '<div style="display:flex;justify-content:space-between;font-size:0.9rem"><span style="color:#1a1a1a">Older</span><span style="color:#666666;font-weight:600">'+olderCount+'</span></div></div>';
        html += '<div style="background:#ffffff;border:1px solid #e0e3e8;border-radius:12px;padding:20px">';
        html += '<p style="color:#666666;font-size:0.8rem;margin:0 0 12px 0;font-weight:600">TOP CUSTOMERS</p>';
        if (topCustomers.length === 0) { html += '<p style="color:#666666;font-size:0.85rem">No data</p>'; }
        else { topCustomers.forEach(function(customer, idx) {
            html += '<div style="display:flex;justify-content:space-between;margin-bottom:'+(idx<topCustomers.length-1?'8px':'0')+';font-size:0.9rem">';
            html += '<span style="color:#1a1a1a">'+customer+'</span><span style="color:#0274be;font-weight:600">'+customers[customer]+'</span></div>';
        }); }
        html += '</div></div>';
        document.getElementById('statsPanel').innerHTML = html;
    }

    // Submission data store (for syncing between tools)
    var mopSubmissions = [];

    // Listen for messages from iframes
    window.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'mop-submitted') {
            closeTool();
        }
        if (event.data && event.data.type === 'mop-submission-data') {
            var payload = event.data.payload;
            if (payload && !mopSubmissions.find(function(s) { return s.id === payload.id; })) {
                mopSubmissions.push(payload);
            }
            closeTool();
        }
    });

    </script>
</body>
</html>
