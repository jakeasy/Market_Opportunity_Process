<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOP — Market Opportunity Process — Medit</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --card-bg: #ffffff;
            --border: #e0e3e8;
            --text: #1a1a1a;
            --text-secondary: #333333;
            --text-muted: #666666;
            --blue: #004fec;
            --blue-hover: #0039b3;
            --purple: #7c3aed;
            --green: #22a861;
            --amber: #f59e0b;
        }
        body { background: #f7f8fa; color: var(--text-secondary); font-family: 'Roboto', sans-serif; min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; padding: 60px 24px 40px; }
        header { text-align: center; margin-bottom: 64px; animation: fadeDown 0.8s ease-out; }
        .logo-mark { display: inline-flex; align-items: center; gap: 14px; margin-bottom: 24px; }
        .logo-m-svg { width: 44px; height: 44px; }
        .logo-text-svg { height: 22px; width: auto; }
        header h1 { font-size: 3rem; font-weight: 700; line-height: 1.15; margin-bottom: 16px; color: #1a1a1a; }
        header p { color: var(--text-muted); font-size: 1.1rem; max-width: 560px; margin: 0 auto; line-height: 1.7; }
        .lang-toggle { position: fixed; top: 20px; right: 24px; z-index: 200; display: flex; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .lang-btn { padding: 7px 14px; font-size: 0.78rem; font-weight: 600; border: none; background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.25s ease; }
        .lang-btn.active { background: var(--blue); color: white; }
        .process-flow { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 56px; animation: fadeDown 0.8s ease-out 0.15s backwards; flex-wrap: wrap; }
        .flow-step { display: flex; align-items: center; gap: 8px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .flow-step .step-num { background: var(--blue); color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }
        .flow-arrow { color: var(--border); font-size: 1.2rem; }
        .cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-bottom: 56px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 32px 28px 28px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: 8px 8px 0 0; transition: height 0.4s ease; }
        .card:nth-child(1)::before { background: var(--blue); }
        .card:nth-child(2)::before { background: var(--purple); }
        .card:nth-child(3)::before { background: var(--green); }
        .card:nth-child(4)::before { background: var(--amber); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .card:hover::before { height: 5px; }
        .card:nth-child(1) { animation: fadeUp 0.7s ease-out 0.2s backwards; }
        .card:nth-child(2) { animation: fadeUp 0.7s ease-out 0.3s backwards; }
        .card:nth-child(3) { animation: fadeUp 0.7s ease-out 0.4s backwards; }
        .card:nth-child(4) { animation: fadeUp 0.7s ease-out 0.5s backwards; }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .card-step { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .card-role { font-size: 0.7rem; font-weight: 500; padding: 4px 10px; border-radius: 12px; background: #f0f4f8; color: #4a5568; white-space: nowrap; border: 1px solid #e2e8f0; }
        .card:nth-child(1) .card-step { color: var(--blue); }
        .card:nth-child(2) .card-step { color: var(--purple); }
        .card:nth-child(3) .card-step { color: var(--green); }
        .card:nth-child(4) .card-step { color: var(--amber); }
        .card-icon { width: 48px; height: 48px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 1.3rem; }
        .card:nth-child(1) .card-icon { background: rgba(2,116,190,0.1); }
        .card:nth-child(2) .card-icon { background: rgba(2,116,190,0.1); }
        .card:nth-child(3) .card-icon { background: rgba(34,168,97,0.1); }
        .card:nth-child(4) .card-icon { background: rgba(245,158,11,0.1); }
        .card h2 { font-size: 1.35rem; font-weight: 700; margin-bottom: 10px; color: #1a1a1a; }
        .card p { color: var(--text-muted); font-size: 0.92rem; line-height: 1.6; margin-bottom: 20px; }
        .card-link { font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: gap 0.3s ease; }
        .card:nth-child(1) .card-link { color: var(--blue); }
        .card:nth-child(2) .card-link { color: var(--purple); }
        .card:nth-child(3) .card-link { color: var(--green); }
        .card:nth-child(4) .card-link { color: var(--amber); }
        .card:hover .card-link { gap: 10px; }
        footer { text-align: center; padding: 32px 0; border-top: 1px solid var(--border); animation: fadeUp 0.7s ease-out 0.6s backwards; }
        footer p { color: var(--text-muted); font-size: 0.85rem; line-height: 1.8; }
        #iframe-view { display: none; position: fixed; inset: 0; z-index: 100; background: #f7f8fa; flex-direction: column; }
        #iframe-view.active { display: flex; }
        .iframe-topbar { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
        .back-btn { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); background: var(--card-bg); border: 1px solid var(--border); padding: 7px 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .back-btn:hover { border-color: var(--blue); color: var(--blue); }
        .iframe-title { font-size: 0.9rem; font-weight: 600; color: #1a1a1a; }
        .iframe-badge { font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; }
        #tool-iframe { flex: 1; width: 100%; border: none; background: #fff; }
        @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .admin-bar { text-align: right; margin-bottom: 16px; }
        .admin-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; background: var(--card-bg); border: 1px dashed var(--border); border-radius: 20px; font-family: 'Roboto', sans-serif; font-size: 0.78rem; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all 0.3s; }
        .admin-btn:hover { border-color: var(--blue); color: var(--blue); background: rgba(0,79,236,0.04); }
        .admin-btn .admin-icon { font-size: 0.85rem; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .cards { grid-template-columns: 1fr; } header h1 { font-size: 2.2rem; } }
    </style>
</head>

    function b64decode(str) {
        try {
            var binStr = atob(str);
            var bytes = new Uint8Array(binStr.length);
            for (var i = 0; i < binStr.length; i++) { bytes[i] = binStr.charCodeAt(i); }
            return new TextDecoder('utf-8').decode(bytes);
        } catch(e) {
            return '<html><body><h1>Decode Error</h1></body></html>';
        }
    }

    var currentBlobUrl = null;

    function openTool(key, title, step, color) {
        try {
            var b64str = toolB64[key];
            if (!b64str) return;
            var html = b64decode(b64str);
            var blob = new Blob([html], {type: 'text/html;charset=utf-8'});
            if (currentBlobUrl) { try { URL.revokeObjectURL(currentBlobUrl); } catch(e){} }
            currentBlobUrl = URL.createObjectURL(blob);
            document.getElementById('tool-iframe').src = currentBlobUrl + (arguments[4] || '');
            document.getElementById('iframeTitle').textContent = title;
            var badge = document.getElementById('iframeBadge');
            badge.textContent = step;
            badge.style.background = color + '22';
            badge.style.color = color;
            document.getElementById('gateway-view').style.display = 'none';
            document.getElementById('langToggle').style.display = 'none';
            document.getElementById('iframe-view').classList.add('active');
            // Sync language to iframe after load (multiple attempts for reliability)
            var iframe = document.getElementById('tool-iframe');
            function sendLangSync() {
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({ type: 'mop-lang-sync', lang: currentLang }, '*');
                }
            }
            iframe.onload = function() { sendLangSync(); };
            setTimeout(sendLangSync, 500);
            setTimeout(sendLangSync, 1200);
            setTimeout(sendLangSync, 2000);
        } catch(e) { alert('Error: ' + e.message); }
    }

    function closeTool() {
        document.getElementById('iframe-view').classList.remove('active');
        document.getElementById('tool-iframe').src = '';
        if (currentBlobUrl) { try { URL.revokeObjectURL(currentBlobUrl); } catch(e){} currentBlobUrl = null; }
        document.getElementById('gateway-view').style.display = '';
        document.getElementById('langToggle').style.display = '';
    }

    function syncDataToScoring() {
        var iframe = document.getElementById('tool-iframe');
        if (iframe && iframe.contentWindow) {
            if (mopSubmissions.length > 0) {
                iframe.contentWindow.postMessage({ type: 'mop-submissions-sync', payload: mopSubmissions }, '*');
            }
            if (mopReviews.length > 0) {
                iframe.contentWindow.postMessage({ type: 'mop-reviews-sync', payload: mopReviews }, '*');
            }
        }
    }

    function openToolWithSync(key, title, step, color) {
        openTool(key, title, step, color);
        if (key === 'scoring') {
            setTimeout(syncDataToScoring, 1500);
        }
    }

    function openStats() {
        openTool('scoring', 'Review Statistics', 'Step 3', '#22a861', '#stats');
        var iframe = document.getElementById('tool-iframe');
        function sendStatsData() {
            if (iframe && iframe.contentWindow) {
                if (mopSubmissions.length > 0) {
                    iframe.contentWindow.postMessage({ type: 'mop-submissions-sync', payload: mopSubmissions }, '*');
                }
                if (mopReviews.length > 0) {
                    iframe.contentWindow.postMessage({ type: 'mop-reviews-sync', payload: mopReviews }, '*');
                }
            }
        }
        iframe.addEventListener('load', sendStatsData, { once: true });
        setTimeout(sendStatsData, 800);
        setTimeout(sendStatsData, 1500);
    }

        setTimeout(sendAfcData, 1500);
    }




    function openPortfolio() {
        openTool('portfolio', 'Project Portfolio Board', 'Admin', '#004fec');
        var iframe = document.getElementById('tool-iframe');
        function sendPortfolioData() {
            if (iframe && iframe.contentWindow) {
                if (mopPortfolioState) {
                    iframe.contentWindow.postMessage({ type: 'mop-portfolio-state-restore', payload: mopPortfolioState }, '*');

                        iframe.contentWindow.postMessage({ type: 'mop-portfolio-add-project', payload: mopPendingPortfolioProject }, '*');

                    }, 300);
                }
            }
        }
        iframe.addEventListener('load', sendPortfolioData, { once: true });
        setTimeout(sendPortfolioData, 800);
        setTimeout(sendPortfolioData, 1500);
    }

        document.getElementById('card4Desc').textContent = t.card4Desc;
        document.getElementById('card4Link').textContent = t.card4Link;
        document.getElementById('card1Role').textContent = t.card1Role;
        document.getElementById('card2Role').textContent = t.card2Role;
        document.getElementById('card3Role').textContent = t.card3Role;
        document.getElementById('card4Role').textContent = t.card4Role;
        document.getElementById('adminBtnText').textContent = t.adminBtn;
        document.getElementById('langEn').classList.toggle('active', lang === 'en');
        document.getElementById('langKo').classList.toggle('active', lang === 'ko');
    }
    setLang('en');

    var mopSubmissions = [];
    var mopReviews = [];
    window.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'mop-lang-change') {
            var lang = event.data.lang;
            if (lang === 'en' || lang === 'ko') { setLang(lang); }
        }
        if (event.data && event.data.type === 'mop-submitted') { closeTool(); }
        if (event.data && event.data.type === 'mop-submission-data') {
            var payload = event.data.payload;
            if (payload && !mopSubmissions.find(function(s){ return s.id === payload.id; })) { mopSubmissions.push(payload); }
        }
        if (event.data && event.data.type === 'mop-review-data') {
            var payload = event.data.payload;
            if (payload && !mopReviews.find(function(r){ return r.id === payload.id; })) { mopReviews.push(payload); }
        }
        if (event.data && event.data.type === 'mop-reviews-full-sync') {
            mopReviews = event.data.payload || [];
        }
        // AFC state persistence
        if (event.data && event.data.type === 'mop-afc-state-save') {
            mopAfcState = event.data.payload;
        }
        // Portfolio state persistence
        if (event.data && event.data.type === 'mop-portfolio-state-save') {
            mopPortfolioState = event.data.payload;
            try { localStorage.setItem('mop_portfolio_state', JSON.stringify(mopPortfolioState)); } catch(e) {}
        }
        // GO decision → store latest reviews so AFC gets them when opened
        if (event.data && event.data.type === 'mop-decision-go') {
            mopAfcNeedsSync = true;
        }
        // AFC finalized → auto-add project to Portfolio and open it
        if (event.data && event.data.type === 'mop-open-portfolio') {
            var pd = event.data.payload || {};
            // Store pending project to add to Portfolio
            mopPendingPortfolioProject = {
                name: pd.title || 'Untitled Project',
                category: '',
                status: 'todo',
                funding: 'funded',
                priority: 'high',
                owner: pd.owner || '',
                mopId: pd.mopId || '',
                notes: 'Score: ' + (pd.score||0) + '/' + (pd.maxScore||0) + ' (' + (pd.percentage||0) + '%) | ' + (pd.region||'') + ' | Submitter: ' + (pd.submitter||'') + ' | ' + (pd.date||'')
            };
            openPortfolio();
        }
    });

    var mopAfcState = null;
    var mopPortfolioState = null;
    try { var _ps = localStorage.getItem('mop_portfolio_state'); if (_ps) mopPortfolioState = JSON.parse(_ps); } catch(e) {}
    var mopAfcNeedsSync = false;
    var mopPendingPortfolioProject = null;

    </script>
</body>
</html>
