<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOP — Market Opportunity Process — Medit</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0a1628; --card: #132238; --border: #1e3a5f;
            --coral: #e8614d; --teal: #1a8a7d; --amber: #d4a017; --purple: #7c6ce0;
            --text: #f5f5f5; --muted: #8a9bb5;
        }
        body { background: var(--primary); color: var(--text); font-family: 'Source Sans 3', sans-serif; min-height: 100vh; }
        .bg-pattern {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 600px 400px at 15% 20%, rgba(26,138,125,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 500px 500px at 85% 75%, rgba(232,97,77,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 300px 300px at 50% 50%, rgba(212,160,23,0.04) 0%, transparent 70%);
        }
        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
            background-image: linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 60px 24px 40px; }
        header { text-align: center; margin-bottom: 64px; animation: fadeDown 0.8s ease-out; }
        .logo-mark { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 24px; }
        .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--coral), var(--teal)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.2rem; color: #fff; }
        .logo-text { font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 600; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; }
        header h1 { font-family: 'Outfit', sans-serif; font-size: 3rem; font-weight: 700; line-height: 1.15; margin-bottom: 16px; background: linear-gradient(135deg, var(--text) 0%, var(--teal) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        header p { color: var(--muted); font-size: 1.1rem; max-width: 560px; margin: 0 auto; line-height: 1.7; }
        .lang-toggle { position: fixed; top: 20px; right: 24px; z-index: 200; display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .lang-btn { padding: 7px 14px; font-family: 'Outfit', sans-serif; font-size: 0.78rem; font-weight: 600; border: none; background: transparent; color: var(--muted); cursor: pointer; transition: all 0.25s ease; }
        .lang-btn.active { background: var(--teal); color: var(--primary); }
        .process-flow { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 56px; animation: fadeDown 0.8s ease-out 0.15s backwards; }
        .flow-step { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; font-family: 'Outfit', sans-serif; font-size: 0.8rem; font-weight: 600; color: var(--muted); white-space: nowrap; }
        .flow-step .step-num { background: var(--border); color: var(--text); width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
        .flow-arrow { color: var(--border); font-size: 1.2rem; }
        .cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-bottom: 56px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px 28px 28px; color: var(--text); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; cursor: pointer; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 16px 16px 0 0; transition: height 0.4s ease; }
        .card:nth-child(1)::before { background: var(--coral); } .card:nth-child(2)::before { background: var(--teal); }
        .card:nth-child(3)::before { background: var(--amber); } .card:nth-child(4)::before { background: var(--purple); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.3); }
        .card:hover::before { height: 4px; }
        .card:nth-child(1) { animation: fadeUp 0.7s ease-out 0.2s backwards; } .card:nth-child(2) { animation: fadeUp 0.7s ease-out 0.3s backwards; }
        .card:nth-child(3) { animation: fadeUp 0.7s ease-out 0.4s backwards; } .card:nth-child(4) { animation: fadeUp 0.7s ease-out 0.5s backwards; }
        .card-step { font-family: 'Outfit', sans-serif; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
        .card:nth-child(1) .card-step { color: var(--coral); } .card:nth-child(2) .card-step { color: var(--teal); }
        .card:nth-child(3) .card-step { color: var(--amber); } .card:nth-child(4) .card-step { color: var(--purple); }
        .card-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 1.3rem; }
        .card:nth-child(1) .card-icon { background: rgba(232,97,77,0.12); } .card:nth-child(2) .card-icon { background: rgba(26,138,125,0.12); }
        .card:nth-child(3) .card-icon { background: rgba(212,160,23,0.12); } .card:nth-child(4) .card-icon { background: rgba(124,108,224,0.12); }
        .card h2 { font-family: 'Outfit', sans-serif; font-size: 1.35rem; font-weight: 700; margin-bottom: 10px; }
        .card p { color: var(--muted); font-size: 0.92rem; line-height: 1.6; margin-bottom: 20px; }
        .card-link { font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: gap 0.3s ease; }
        .card:nth-child(1) .card-link { color: var(--coral); } .card:nth-child(2) .card-link { color: var(--teal); }
        .card:nth-child(3) .card-link { color: var(--amber); } .card:nth-child(4) .card-link { color: var(--purple); }
        .card:hover .card-link { gap: 10px; }
        footer { text-align: center; padding: 32px 0; border-top: 1px solid var(--border); animation: fadeUp 0.7s ease-out 0.6s backwards; }
        footer p { color: var(--muted); font-size: 0.85rem; line-height: 1.8; }
        footer strong { color: var(--text); font-family: 'Outfit', sans-serif; }
        #iframe-view { display: none; position: fixed; inset: 0; z-index: 100; background: var(--primary); flex-direction: column; }
        #iframe-view.active { display: flex; }
        .iframe-topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
        .back-btn { font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 600; color: var(--muted); background: none; border: 1px solid var(--border); padding: 7px 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .back-btn:hover { border-color: var(--teal); color: var(--teal); }
        .iframe-title { font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 600; color: var(--text); }
        .iframe-badge { font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; }
        #tool-iframe { flex: 1; width: 100%; border: none; background: #fff; }
        @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .process-flow { flex-wrap: wrap; } .cards { grid-template-columns: 1fr; } header h1 { font-size: 2.2rem; } }
    </style>
</head>

    <div class="bg-pattern"></div>

            <div id="adminPanel" style="display:none;">

                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28px;">
                        <div><h2 style="font-family:'Outfit',sans-serif; font-size:1.4rem; font-weight:700; margin:0;">Submissions</h2>
                        <p style="color:var(--muted); font-size:0.85rem; margin-top:4px;" id="adminSubCount"></p></div>
                        <button onclick="closeAdmin()" style="background:none; border:1px solid var(--border); color:var(--muted); padding:8px 18px; border-radius:8px; cursor:pointer; font-family:'Outfit',sans-serif; font-size:0.85rem; font-weight:600;">Close</button>
                    </div>
                    <div id="submissionsList"></div>
                </div>
            </div>
            <footer>
                <p><strong>Market Opportunity Process — Medit</strong></p>
                <p id="footerDesc"></p>
                <p style="margin-top:14px;"><a href="#" onclick="openAdmin(event)" style="color:var(--muted); font-size:0.8rem; text-decoration:none; opacity:0.45;">Admin</a></p>
            </footer>
        </div>
    </div>

            <span class="iframe-title" id="iframeTitle"></span>
        </div>

    function b64decode(str) {
        return decodeURIComponent(atob(str).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
    }

    var currentBlobUrl = null;

    function openTool(key, title, step, color) {
        var html = b64decode(toolB64[key]);
        var blob = new Blob([html], {type: 'text/html;charset=utf-8'});
        if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
        currentBlobUrl = URL.createObjectURL(blob);
        document.getElementById('tool-iframe').src = currentBlobUrl;
        document.getElementById('iframeTitle').textContent = title;
        var badge = document.getElementById('iframeBadge');
        badge.textContent = step;
        badge.style.background = color + '22';
        badge.style.color = color;
        document.getElementById('gateway-view').style.display = 'none';
        document.getElementById('langToggle').style.display = 'none';
        document.getElementById('iframe-view').classList.add('active');
    }

    function closeTool() {
        document.getElementById('iframe-view').classList.remove('active');
        document.getElementById('tool-iframe').src = '';
        if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }
        document.getElementById('gateway-view').style.display = '';
        document.getElementById('langToggle').style.display = '';
    }

    // Language
    var i18n = {
        en: { headerDesc: 'A structured process to evaluate market opportunities and drive them to execution.', card1Desc: 'Propose a market opportunity. Describe the customer problem, strategic fit, growth impact, and supporting evidence.', card1Link: 'Create Submission \u2192', card2Desc: 'Evaluate submitted opportunities across 8 weighted criteria including strategic alignment, market size, and customer impact.', card2Link: 'Start Scoring \u2192', card3Desc: 'Approval for Initiation. Build the solution concept, market analysis, and business case for opportunities that pass scoring.', card3Link: 'Open AFI Package \u2192', card4Desc: 'Approval for Commercialization. Verify readiness across product, regulatory, sales, marketing, and support before launch.', card4Link: 'Open Checklist \u2192', footerDesc: 'MOP manages the full lifecycle from opportunity discovery through commercialization.' },

    function setLang(lang) {
        var t = i18n[lang];
        document.getElementById('headerDesc').textContent = t.headerDesc;
        document.getElementById('card1Desc').textContent = t.card1Desc;
        document.getElementById('card1Link').textContent = t.card1Link;
        document.getElementById('card2Desc').textContent = t.card2Desc;
        document.getElementById('card2Link').textContent = t.card2Link;
        document.getElementById('card3Desc').textContent = t.card3Desc;
        document.getElementById('card3Link').textContent = t.card3Link;
        document.getElementById('card4Desc').textContent = t.card4Desc;
        document.getElementById('card4Link').textContent = t.card4Link;
        document.getElementById('footerDesc').textContent = t.footerDesc;
        document.getElementById('langEn').classList.toggle('active', lang === 'en');
        document.getElementById('langKo').classList.toggle('active', lang === 'ko');
    }
    setLang('en');

    // Admin
    function openAdmin(e) {
        e.preventDefault();
        var pw = prompt('Enter admin password:');
        if (pw !== 'medit1234') { if (pw !== null) alert('Incorrect password.'); return; }
        renderSubmissions();
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminPanel').scrollIntoView({ behavior: 'smooth' });
    }
    function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
    function renderSubmissions() {
        var keys = [];
        try { for (var i = 0; i < localStorage.length; i++) { var k = localStorage.key(i); if (k.indexOf('mop_submission_') === 0) keys.push(k); } } catch(e) {}
        keys.sort().reverse();
        var box = document.getElementById('submissionsList');
        document.getElementById('adminSubCount').textContent = keys.length + ' submission(s)';
        if (keys.length === 0) { box.innerHTML = '<p style="color:var(--muted); text-align:center; padding:48px 0;">No submissions yet.</p>'; return; }
        var h = '';
        keys.forEach(function(key, idx) {
            try {
                var item = JSON.parse(localStorage.getItem(key)), d = item.data;
                var date = new Date(item.timestamp).toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
                var cx = (d.initialComplexity||'N/A').toUpperCase();
                var cc = cx==='HIGH'?'#e8614d':cx==='MEDIUM'?'#d4a017':cx==='LOW'?'#22c55e':'#888';
                h += '<div style="background:var(--primary);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden">';
                h += '<div onclick="toggleDetail('+idx+')" style="padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:14px">';
                h += '<span style="color:var(--muted);font-size:0.8rem;font-weight:600;min-width:24px">'+(idx+1)+'</span>';
                h += '<span style="color:var(--text);font-family:Outfit,sans-serif;font-weight:600;flex:1;font-size:0.95rem">'+(d.opportunityTitle||'Untitled')+'</span>';
                h += '<span style="background:'+cc+'18;color:'+cc+';padding:3px 10px;border-radius:4px;font-size:0.72rem;font-weight:700">'+cx+'</span>';
                h += '<span style="color:var(--muted);font-size:0.78rem;white-space:nowrap">'+date+'</span>';
                h += '<span id="arrow-'+idx+'" style="color:var(--muted);font-size:0.65rem;transition:transform 0.3s">\u25BC</span></div>';
                h += '<div id="detail-'+idx+'" style="display:none;padding:0 20px 24px 58px;border-top:1px solid var(--border)"><table style="width:100%;border-collapse:collapse;margin-top:16px">';
                h += sr('Request Type',d.requestType)+sr('Request Owner',d.requestOwner)+sr('Target Customer',d.targetCustomer);
                h += br('OPPORTUNITY SUMMARY',d.opportunitySummary)+br('PROBLEM BEING SOLVED',d.problemBeingSolved);
                h += br('STRATEGIC RELEVANCE',d.strategicRelevance)+br('GROWTH IMPACT',d.growthImpact);
                h += br('EVIDENCE',d.evidence)+br('PRIORITY ARGUMENT',d.priorityArgument);
                if(d.visibleDependencies) h += br('DEPENDENCIES',d.visibleDependencies);
                h += '</table><div style="margin-top:20px;text-align:right"><button onclick="delSub(\''+key+'\')" style="background:none;border:1px solid rgba(232,97,77,0.25);color:var(--coral);padding:6px 16px;border-radius:6px;cursor:pointer;font-size:0.8rem;font-family:Outfit,sans-serif;font-weight:600">Delete</button></div></div></div>';
            } catch(e){}
        });
        box.innerHTML = h;
    }
    function sr(l,v){return '<tr><td style="color:var(--muted);padding:6px 16px 6px 0;vertical-align:top;width:160px;font-size:0.82rem">'+l+'</td><td style="color:var(--text);padding:6px 0;font-size:0.85rem">'+(v||'-')+'</td></tr>';}
    function br(l,v){return '<tr><td colspan="2" style="padding:14px 0 4px;color:var(--coral);font-weight:700;font-size:0.75rem;letter-spacing:0.5px">'+l+'</td></tr><tr><td colspan="2" style="color:#ccc;padding:2px 0 8px;font-size:0.85rem;line-height:1.65">'+(v||'-')+'</td></tr>';}
    function toggleDetail(i){var d=document.getElementById('detail-'+i),a=document.getElementById('arrow-'+i);if(d.style.display==='none'){d.style.display='block';a.style.transform='rotate(180deg)';}else{d.style.display='none';a.style.transform='rotate(0deg)';}}
    function delSub(k){if(!confirm('Delete?'))return;try{localStorage.removeItem(k);}catch(e){}renderSubmissions();}
    </script>
