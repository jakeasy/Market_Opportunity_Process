<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOP — Market Opportunity Process — Medit</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-deep: #0a0e1a;
            --bg-card: #111827;
            --bg-card-hover: #1a2235;
            --bg-surface: #0f1525;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.12);
            --text: #f0f2f5;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --blue: #3b82f6;
            --blue-glow: rgba(59,130,246,0.15);
            --blue-vivid: #60a5fa;
            --purple: #a78bfa;
            --green: #34d399;
            --amber: #fbbf24;
            --accent-1: #3b82f6;
            --accent-2: #8b5cf6;
            --accent-3: #10b981;
            --accent-4: #f59e0b;
        }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg-deep);
            color: var(--text);
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* ── Ambient background ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 800px 600px at 20% 10%, rgba(59,130,246,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 600px 500px at 80% 80%, rgba(139,92,246,0.04) 0%, transparent 70%),
                radial-gradient(ellipse 500px 400px at 60% 30%, rgba(16,185,129,0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        /* Grid texture */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .container { max-width: 1120px; margin: 0 auto; padding: 56px 24px 40px; position: relative; z-index: 1; }

        /* ── Language Toggle ── */
        .lang-toggle {
            position: fixed; top: 20px; right: 24px; z-index: 200;
            display: flex; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: 10px;
            overflow: hidden; backdrop-filter: blur(12px);
        }
        .lang-btn {
            padding: 8px 16px; font-size: 0.78rem; font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            border: none; background: transparent; color: var(--text-muted);
            cursor: pointer; transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }
        .lang-btn.active {
            background: var(--blue); color: #fff;
            box-shadow: 0 0 20px rgba(59,130,246,0.3);
        }

        /* ── Header ── */
        header {
            text-align: center;
            margin-bottom: 56px;
            animation: fadeDown 0.9s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .logo-mark {
            display: inline-flex; align-items: center; gap: 14px;
            margin-bottom: 32px;
        }
        .logo-m-svg { width: 44px; height: 44px; }
        .logo-text-svg { height: 22px; width: auto; }
        /* ── Password Modal ── */
        .pw-overlay {
            display: none; position: fixed; inset: 0; z-index: 9000;
            background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
            align-items: center; justify-content: center;
        }
        .pw-overlay.active { display: flex; }
        .pw-modal {
            background: var(--bg-card); border: 1px solid var(--border-hover);
            border-radius: 16px; padding: 36px 32px 28px; width: 380px; max-width: 90vw;
            text-align: center; box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            animation: fadeDown 0.3s ease;
        }
        .pw-modal .pw-icon { font-size: 2.4rem; margin-bottom: 12px; }
        .pw-modal .pw-title { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .pw-modal .pw-role { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.5; }
        .pw-modal .pw-role strong { color: var(--blue-vivid); font-weight: 600; }
        .pw-input-wrap { position: relative; margin-bottom: 8px; }
        .pw-input {
            width: 100%; padding: 12px 16px; border-radius: 10px;
            border: 1px solid var(--border-hover); background: var(--bg-deep);
            color: #fff; font-size: 1rem; font-family: 'JetBrains Mono', monospace;
            letter-spacing: 4px; text-align: center; outline: none;
            transition: border-color 0.2s;
        }
        .pw-input:focus { border-color: var(--blue-vivid); }
        .pw-input.error { border-color: #ef4444; animation: shake 0.4s ease; }
        .pw-error { color: #ef4444; font-size: 0.78rem; height: 20px; line-height: 20px; margin-bottom: 8px; }
        .pw-btns { display: flex; gap: 10px; }
        .pw-btn {
            flex: 1; padding: 11px 0; border-radius: 10px; font-size: 0.88rem;
            font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
        }
        .pw-btn-cancel { background: rgba(255,255,255,0.06); color: var(--text-secondary); }
        .pw-btn-cancel:hover { background: rgba(255,255,255,0.1); }
        .pw-btn-enter { background: var(--blue); color: #fff; }
        .pw-btn-enter:hover { background: #2563eb; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
        header h1 {
            font-size: 3.2rem; font-weight: 800; line-height: 1.1;
            margin-bottom: 16px; color: #fff;
            letter-spacing: -1.5px;
        }
        header h1 .gradient-text {
            background: linear-gradient(135deg, var(--blue-vivid) 0%, var(--purple) 50%, var(--green) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        header p {
            color: var(--text-secondary); font-size: 1.05rem;
            max-width: 520px; margin: 0 auto; line-height: 1.7;
            font-weight: 400;
        }

        /* ── Process Flow ── */
        .process-flow {
            display: flex; align-items: center; justify-content: center;
            gap: 6px; margin-bottom: 48px; flex-wrap: wrap;
            animation: fadeDown 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.1s backwards;
        }
        .flow-step {
            display: flex; align-items: center; gap: 8px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 10px; padding: 8px 16px;
            font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);
            white-space: nowrap;
        }
        .flow-step .step-num {
            background: var(--blue); color: white;
            width: 22px; height: 22px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }
        .flow-arrow { color: var(--text-muted); font-size: 1rem; opacity: 0.4; }

        /* ── Admin Bar ── */
        .admin-bar { text-align: right; margin-bottom: 16px; }
        .admin-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 9px 20px; background: var(--bg-card);
            border: 1px dashed rgba(255,255,255,0.1); border-radius: 10px;
            font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 600;
            color: var(--text-muted); cursor: pointer; transition: all 0.3s;
        }
        .admin-btn:hover {
            border-color: var(--blue); color: var(--blue-vivid);
            background: rgba(59,130,246,0.05);
            box-shadow: 0 0 20px rgba(59,130,246,0.08);
        }
        .admin-btn .admin-icon { font-size: 0.85rem; }

        /* ── Step Cards ── */
        .cards {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
            margin-bottom: 64px;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px; padding: 32px 28px 28px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden; cursor: pointer;
        }
        /* Glow line top */
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            transition: height 0.4s ease, opacity 0.4s ease;
            opacity: 0.7;
        }
        .card::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 80px;
            opacity: 0; transition: opacity 0.5s ease;
            pointer-events: none;
        }
        .card:nth-child(1)::before { background: linear-gradient(90deg, var(--accent-1), #60a5fa); }
        .card:nth-child(2)::before { background: linear-gradient(90deg, var(--accent-2), #c4b5fd); }
        .card:nth-child(3)::before { background: linear-gradient(90deg, var(--accent-3), #6ee7b7); }
        .card:nth-child(4)::before { background: linear-gradient(90deg, var(--accent-4), #fcd34d); }

        .card:nth-child(1)::after { background: linear-gradient(180deg, rgba(59,130,246,0.06) 0%, transparent); }
        .card:nth-child(2)::after { background: linear-gradient(180deg, rgba(139,92,246,0.06) 0%, transparent); }
        .card:nth-child(3)::after { background: linear-gradient(180deg, rgba(16,185,129,0.06) 0%, transparent); }
        .card:nth-child(4)::after { background: linear-gradient(180deg, rgba(245,158,11,0.06) 0%, transparent); }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--border-hover);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }
        .card:hover::before { height: 4px; opacity: 1; }
        .card:hover::after { opacity: 1; }

        .card:nth-child(1) { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.15s backwards; }
        .card:nth-child(2) { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.25s backwards; }
        .card:nth-child(3) { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.35s backwards; }
        .card:nth-child(4) { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.45s backwards; }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; position: relative; z-index: 1; }
        .card-step {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .card-role {
            font-size: 0.68rem; font-weight: 500;
            padding: 4px 10px; border-radius: 8px;
            background: rgba(255,255,255,0.04);
            color: var(--text-muted); white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .card:nth-child(1) .card-step { color: var(--accent-1); }
        .card:nth-child(2) .card-step { color: var(--accent-2); }
        .card:nth-child(3) .card-step { color: var(--accent-3); }
        .card:nth-child(4) .card-step { color: var(--accent-4); }

        .card-icon {
            width: 52px; height: 52px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; font-size: 1.3rem;
            position: relative; z-index: 1;
        }
        .card:nth-child(1) .card-icon { background: rgba(59,130,246,0.1); }
        .card:nth-child(2) .card-icon { background: rgba(139,92,246,0.1); }
        .card:nth-child(3) .card-icon { background: rgba(16,185,129,0.1); }
        .card:nth-child(4) .card-icon { background: rgba(245,158,11,0.1); }

        .card h2 {
            font-size: 1.3rem; font-weight: 700;
            margin-bottom: 10px; color: #fff;
            position: relative; z-index: 1;
        }
        .card p {
            color: var(--text-muted); font-size: 0.9rem;
            line-height: 1.65; margin-bottom: 22px;
            position: relative; z-index: 1;
        }
        .card-link {
            font-size: 0.84rem; font-weight: 600;
            display: inline-flex; align-items: center; gap: 6px;
            transition: gap 0.3s ease;
            position: relative; z-index: 1;
        }
        .card:nth-child(1) .card-link { color: var(--blue-vivid); }
        .card:nth-child(2) .card-link { color: var(--purple); }
        .card:nth-child(3) .card-link { color: var(--green); }
        .card:nth-child(4) .card-link { color: var(--amber); }
        .card:hover .card-link { gap: 10px; }

        /* ── Footer ── */
        footer {
            text-align: center; padding: 32px 0;
            border-top: 1px solid var(--border);
            animation: fadeUp 0.7s ease-out 0.55s backwards;
        }
        footer p { color: var(--text-muted); font-size: 0.82rem; line-height: 1.8; }

        /* ── Iframe View ── */
        #iframe-view {
            display: none; position: fixed; inset: 0;
            z-index: 100; background: var(--bg-deep);
            flex-direction: column;
        }
        #iframe-view.active { display: flex; }
        .iframe-topbar {
            background: var(--bg-card); border-bottom: 1px solid var(--border);
            padding: 10px 20px; display: flex; align-items: center; gap: 16px;
            flex-shrink: 0;
        }
        .back-btn {
            font-size: 0.85rem; font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-secondary); background: var(--bg-surface);
            border: 1px solid var(--border); padding: 7px 16px;
            border-radius: 8px; cursor: pointer; transition: all 0.2s;
        }
        .back-btn:hover { border-color: var(--blue); color: var(--blue-vivid); }
        .iframe-title { font-size: 0.9rem; font-weight: 600; color: #fff; }
        .iframe-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem; font-weight: 700;
            padding: 3px 10px; border-radius: 6px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        #tool-iframe { flex: 1; width: 100%; border: none; background: #fff; }

        /* ── Animations ── */
        @keyframes fadeDown { from { opacity: 0; transform: translateY(-24px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .cards { grid-template-columns: 1fr; }
            header h1 { font-size: 2.2rem; letter-spacing: -0.5px; }
        }
    </style>
</head>

    function b64decode(str) {
        try {
            var binStr = atob(str);
            var bytes = new Uint8Array(binStr.length);
            for (var i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
            return new TextDecoder('utf-8').decode(bytes);
        } catch(e) { return atob(str); }
    }

    function openTool(key, title, step, color) {
        var b64 = toolB64[key];
        if (!b64) return;
        var html = b64decode(b64);
        var blob = new Blob([html], { type: 'text/html; charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var iframe = document.getElementById('tool-iframe');
        iframe.src = url;
        document.getElementById('iframeTitle').textContent = title;
        var badge = document.getElementById('iframeBadge');
        badge.textContent = step;
        badge.style.background = color;
        badge.style.color = '#fff';
        document.getElementById('gateway-view').style.display = 'none';
        document.getElementById('iframe-view').classList.add('active');

        function sendLangSync() {
            try {
                iframe.contentWindow.postMessage({ type: 'mop-lang-sync', lang: currentLang }, '*');
            } catch(e) {}
        }
        iframe.onload = function() { sendLangSync(); };
        setTimeout(sendLangSync, 500);
        setTimeout(sendLangSync, 1200);
    }

    function closeTool() {
        var iframe = document.getElementById('tool-iframe');
        try { URL.revokeObjectURL(iframe.src); } catch(e) {}
        iframe.src = 'about:blank';
        document.getElementById('iframe-view').classList.remove('active');
        document.getElementById('gateway-view').style.display = '';
    }

    function syncDataToScoring() {
        var iframe = document.getElementById('tool-iframe');
        try {
            if (mopSubmissions.length > 0) {
                iframe.contentWindow.postMessage({ type: 'mop-submissions-sync', payload: mopSubmissions }, '*');
            }
            if (mopReviews.length > 0) {
                iframe.contentWindow.postMessage({ type: 'mop-reviews-sync', payload: mopReviews }, '*');
            }
        } catch(e) {}
    }
    function openToolWithSync(key, title, step, color) {
        openTool(key, title, step, color);
        var iframe = document.getElementById('tool-iframe');
        iframe.addEventListener('load', function() { setTimeout(syncDataToScoring, 300); }, { once: true });
        setTimeout(syncDataToScoring, 800);
    }
    function openStats() {
        openTool('scoring', 'Review Statistics', 'Step 3', '#10b981', '#stats');
        var iframe = document.getElementById('tool-iframe');
        function sendStatsData() {
            try {
                if (mopSubmissions.length > 0) {
                    iframe.contentWindow.postMessage({ type: 'mop-submissions-sync', payload: mopSubmissions }, '*');
                }
                if (mopReviews.length > 0) {
                    iframe.contentWindow.postMessage({ type: 'mop-reviews-sync', payload: mopReviews }, '*');
                }
            } catch(e) {}
        }
        iframe.addEventListener('load', function() { setTimeout(sendStatsData, 300); }, { once: true });
        setTimeout(sendStatsData, 800);
        setTimeout(sendStatsData, 1500);
    }
    function openAFC() {
        openTool('afc', 'AFC Readiness Checklist', 'Step 4', '#f59e0b');
        var iframe = document.getElementById('tool-iframe');
        function sendAfcData() {
            try {
                if (iframe && iframe.contentWindow) {
                    if (mopReviews.length > 0) {
                        iframe.contentWindow.postMessage({ type: 'mop-reviews-sync', payload: mopReviews }, '*');
                    }
                    if (mopAfcState) {
                        iframe.contentWindow.postMessage({ type: 'mop-afc-state-restore', payload: mopAfcState }, '*');
                    }
                }
            } catch(e) {}
        }
        iframe.addEventListener('load', sendAfcData, { once: true });
        setTimeout(sendAfcData, 800);
        setTimeout(sendAfcData, 1500);
    }

    function openPortfolio() {
        openTool('portfolio', 'Project Portfolio Board', 'Admin', '#3b82f6');
        var iframe = document.getElementById('tool-iframe');
        function sendPortfolioData() {
            if (iframe && iframe.contentWindow) {
                if (mopPortfolioState) {
                    iframe.contentWindow.postMessage({ type: 'mop-portfolio-state-restore', payload: mopPortfolioState }, '*');
                }
                if (mopPendingPortfolioProject) {
                    setTimeout(function() {
                        iframe.contentWindow.postMessage({ type: 'mop-portfolio-add-project', payload: mopPendingPortfolioProject }, '*');
                        mopPendingPortfolioProject = null;
                    }, 300);
                }
            }
        }
        iframe.addEventListener('load', sendPortfolioData, { once: true });
        setTimeout(sendPortfolioData, 800);
        setTimeout(sendPortfolioData, 1500);
    }

    function requirePw(toolKey) {
        pwPending = toolKey;
        var info = pwInfo[toolKey][currentLang] || pwInfo[toolKey].en;
        document.getElementById('pwTitle').textContent = info.title;
        document.getElementById('pwRole').innerHTML = info.desc;

        document.getElementById('pwError').textContent = '';

    function closePwModal() {
        document.getElementById('pwOverlay').classList.remove('active');
        pwPending = null;
    }

    function submitPw() {
        var val = document.getElementById('pwInput').value;
        if (val === TOOL_PW) {
            document.getElementById('pwOverlay').classList.remove('active');
            var key = pwPending;
            pwPending = null;
            if (key === 'scoring') openToolWithSync('scoring','MOP Scoring Tool','Step 2','#8b5cf6');
            else if (key === 'stats') openStats();
            else if (key === 'afc') openAFC();
        } else {
            var inp = document.getElementById('pwInput');
            inp.classList.add('error');
            document.getElementById('pwError').textContent = currentLang === 'ko' ? '비밀번호가 올바르지 않습니다.' : 'Incorrect password. Please try again.';
            inp.value = '';
            inp.focus();
            setTimeout(function() { inp.classList.remove('error'); }, 600);
        }
    }

    // Enter key support for password input
    document.addEventListener('keydown', function(e) {
        if (document.getElementById('pwOverlay').classList.contains('active')) {
            if (e.key === 'Enter') submitPw();
            if (e.key === 'Escape') closePwModal();
        }
    });

    }
    setLang('en');

    var mopSubmissions = [];
    var mopReviews = [];
    window.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'mop-lang-change') {
            var lang = event.data.lang;
            if (lang === 'en' || lang === 'ko') { setLang(lang); }
        }
        if (event.data && event.data.type === 'mop-submitted') { closeTool(); }
        if (event.data && event.data.type === 'mop-submission-data') {
            var payload = event.data.payload;
            if (payload && !mopSubmissions.find(function(s){ return s.id === payload.id; })) { mopSubmissions.push(payload); }
        }
        if (event.data && event.data.type === 'mop-review-data') {
            var payload = event.data.payload;
            if (payload && !mopReviews.find(function(r){ return r.id === payload.id; })) { mopReviews.push(payload); }
        }
        if (event.data && event.data.type === 'mop-reviews-full-sync') {
            mopReviews = event.data.payload || [];
        }
        if (event.data && event.data.type === 'mop-afc-state-save') {
            mopAfcState = event.data.payload;
        }
        if (event.data && event.data.type === 'mop-portfolio-state-save') {
            mopPortfolioState = event.data.payload;
            try { localStorage.setItem('mop_portfolio_state', JSON.stringify(mopPortfolioState)); } catch(e) {}
        }
        if (event.data && event.data.type === 'mop-decision-go') {
            mopAfcNeedsSync = true;
        }
        if (event.data && event.data.type === 'mop-open-portfolio') {
            var pd = event.data.payload || {};
            mopPendingPortfolioProject = {
                name: pd.title || 'Untitled Project',
                category: '',
                status: 'todo',
                funding: 'funded',
                priority: 'high',
                owner: pd.owner || '',
                mopId: pd.mopId || '',
                notes: 'Score: ' + (pd.score||0) + '/' + (pd.maxScore||0) + ' (' + (pd.percentage||0) + '%) | ' + (pd.region||'') + ' | Submitter: ' + (pd.submitter||'') + ' | ' + (pd.date||'')
            };
            openPortfolio();
        }
    });

    var mopAfcState = null;
    var mopPortfolioState = null;
    try { var _ps = localStorage.getItem('mop_portfolio_state'); if (_ps) mopPortfolioState = JSON.parse(_ps); } catch(e) {}
    var mopAfcNeedsSync = false;
    var mopPendingPortfolioProject = null;

    </script>
</body>
</html>
