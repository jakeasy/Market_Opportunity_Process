<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOP — Market Opportunity Process — Medit</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #0a1628;
            --surface: #0f1f2e;
            --card: #132238;
            --border: #1e3a5f;
            --coral: #e8614d;
            --teal: #1a8a7d;
            --amber: #d4a017;
            --text: #f5f5f5;
            --muted: #8a9bb5;
        }

        body {
            background: var(--primary);
            color: var(--text);
            font-family: 'Source Sans 3', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-pattern {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 600px 400px at 15% 20%, rgba(26,138,125,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 500px 500px at 85% 75%, rgba(232,97,77,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 300px 300px at 50% 50%, rgba(212,160,23,0.04) 0%, transparent 70%);
        }

        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
            background-image:
                linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .container {
            position: relative; z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 24px 40px;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 64px;
            animation: fadeDown 0.8s ease-out;
        }

        .logo-mark {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--coral), var(--teal));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Outfit', sans-serif;
            font-weight: 800; font-size: 1.2rem;
            color: #fff;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--text) 0%, var(--teal) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: var(--muted);
            font-size: 1.1rem;
            max-width: 560px;
            margin: 0 auto;
            line-height: 1.7;
        }

        /* Process flow */
        .process-flow {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 56px;
            animation: fadeDown 0.8s ease-out 0.15s backwards;
        }

        .flow-step {
            display: flex; align-items: center; gap: 8px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 16px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--muted);
            white-space: nowrap;
        }

        .flow-step .step-num {
            background: var(--border);
            color: var(--text);
            width: 22px; height: 22px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem;
        }

        .flow-arrow {
            color: var(--border);
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .process-flow { flex-wrap: wrap; }
        }

        /* Cards grid */
        .cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 56px;
        }

        @media (max-width: 700px) {
            .cards { grid-template-columns: 1fr; }
            header h1 { font-size: 2.2rem; }
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px 28px 28px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            display: block;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            border-radius: 16px 16px 0 0;
            transition: height 0.4s ease;
        }

        .card:nth-child(1)::before { background: var(--coral); }
        .card:nth-child(2)::before { background: var(--teal); }
        .card:nth-child(3)::before { background: var(--amber); }
        .card:nth-child(4)::before { background: #7c6ce0; }

        .card:hover {
            transform: translateY(-4px);
            border-color: transparent;
            box-shadow: 0 16px 48px rgba(0,0,0,0.3);
        }

        .card:hover::before { height: 4px; }

        .card:nth-child(1):hover { border-color: rgba(232,97,77,0.3); }
        .card:nth-child(2):hover { border-color: rgba(26,138,125,0.3); }
        .card:nth-child(3):hover { border-color: rgba(212,160,23,0.3); }
        .card:nth-child(4):hover { border-color: rgba(124,108,224,0.3); }

        .card:nth-child(1) { animation: fadeUp 0.7s ease-out 0.2s backwards; }
        .card:nth-child(2) { animation: fadeUp 0.7s ease-out 0.3s backwards; }
        .card:nth-child(3) { animation: fadeUp 0.7s ease-out 0.4s backwards; }
        .card:nth-child(4) { animation: fadeUp 0.7s ease-out 0.5s backwards; }

        .card-step {
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        .card:nth-child(1) .card-step { color: var(--coral); }
        .card:nth-child(2) .card-step { color: var(--teal); }
        .card:nth-child(3) .card-step { color: var(--amber); }
        .card:nth-child(4) .card-step { color: #7c6ce0; }

        .card-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .card:nth-child(1) .card-icon { background: rgba(232,97,77,0.12); }
        .card:nth-child(2) .card-icon { background: rgba(26,138,125,0.12); }
        .card:nth-child(3) .card-icon { background: rgba(212,160,23,0.12); }
        .card:nth-child(4) .card-icon { background: rgba(124,108,224,0.12); }

        .card h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .card p {
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .card-link {
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: gap 0.3s ease;
        }

        .card:nth-child(1) .card-link { color: var(--coral); }
        .card:nth-child(2) .card-link { color: var(--teal); }
        .card:nth-child(3) .card-link { color: var(--amber); }
        .card:nth-child(4) .card-link { color: #7c6ce0; }

        .card:hover .card-link { gap: 10px; }

        /* Language toggle */
        .lang-toggle {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 100;
            display: flex;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            animation: fadeDown 0.8s ease-out;
        }

        .lang-btn {
            padding: 7px 14px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
        }

        .lang-btn.active {
            background: var(--teal);
            color: var(--primary);
        }

        .lang-btn:hover:not(.active) {
            color: var(--text);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 32px 0;
            border-top: 1px solid var(--border);
            animation: fadeUp 0.7s ease-out 0.6s backwards;
        }

        footer p {
            color: var(--muted);
            font-size: 0.85rem;
            line-height: 1.8;
        }

        footer strong {
            color: var(--text);
            font-family: 'Outfit', sans-serif;
        }

        /* Animations */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Print */
        @media print {
            body { background: #fff; }
            .bg-pattern, .bg-grid { display: none; }
            .card { border: 1px solid #ddd; break-inside: avoid; }
            header h1 { color: var(--primary); -webkit-text-fill-color: var(--primary); }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="bg-grid"></div>

    <div class="lang-toggle">
        <button class="lang-btn active" id="langEn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" id="langKo" onclick="setLang('ko')">한국어</button>
    </div>

    <div class="container">
        <header>
            <div class="logo-mark">
                <div class="logo-icon">M</div>
                <span class="logo-text">Medit</span>
            </div>
            <h1>Market Opportunity Process</h1>
            <p id="headerDesc"></p>
        </header>

        <div class="process-flow">
            <div class="flow-step"><span class="step-num">1</span> Submit</div>
            <span class="flow-arrow">→</span>
            <div class="flow-step"><span class="step-num">2</span> Score</div>
            <span class="flow-arrow">→</span>
            <div class="flow-step"><span class="step-num">3</span> Initiate</div>
            <span class="flow-arrow">→</span>
            <div class="flow-step"><span class="step-num">4</span> Commercialize</div>
        </div>

        <div class="cards">

            <a class="card" href="MOP_Submission_Form.html">
                <div class="card-step">Step 1</div>
                <div class="card-icon">📝</div>
                <h2>MOP Submission Form</h2>
                <p id="card1Desc"></p>
                <span class="card-link" id="card1Link"></span>
            </a>

            <a class="card" href="MOP_Scoring_Tool.html">
                <div class="card-step">Step 2</div>
                <div class="card-icon">📊</div>
                <h2>MOP Scoring Tool</h2>
                <p id="card2Desc"></p>
                <span class="card-link" id="card2Link"></span>
            </a>

            <a class="card" href="AFI_Package.html">
                <div class="card-step">Step 3</div>
                <div class="card-icon">📋</div>
                <h2>AFI Package</h2>
                <p id="card3Desc"></p>
                <span class="card-link" id="card3Link"></span>
            </a>

            <a class="card" href="AFC_Readiness_Checklist.html">
                <div class="card-step">Step 4</div>
                <div class="card-icon">✅</div>
                <h2>AFC Readiness Checklist</h2>
                <p id="card4Desc"></p>
                <span class="card-link" id="card4Link"></span>
            </a>

        </div>

        <!-- Admin Panel (hidden by default) -->
        <div id="adminPanel" style="display:none; animation: fadeUp 0.5s ease-out;">
            <div style="background:var(--card); border:1px solid var(--border); border-radius:16px; padding:32px; margin-bottom:56px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28px;">
                    <div>
                        <h2 style="font-family:'Outfit',sans-serif; font-size:1.4rem; font-weight:700; margin:0;">Submissions</h2>
                        <p style="color:var(--muted); font-size:0.85rem; margin-top:4px;" id="adminSubCount"></p>
                    </div>
                    <button onclick="closeAdmin()" style="background:none; border:1px solid var(--border); color:var(--muted); padding:8px 18px; border-radius:8px; cursor:pointer; font-family:'Outfit',sans-serif; font-size:0.85rem; font-weight:600; transition:all 0.2s;" onmouseover="this.style.borderColor='var(--coral)';this.style.color='var(--coral)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">Close</button>
                </div>
                <div id="submissionsList"></div>
            </div>
        </div>

        <footer>
            <p><strong>Market Opportunity Process — Medit</strong></p>
            <p id="footerDesc"></p>
            <p style="margin-top:14px;">
                <a href="#" id="adminLink" onclick="openAdmin(event)" style="color:var(--muted); font-size:0.8rem; text-decoration:none; opacity:0.45; transition:opacity 0.3s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='0.45'">Admin</a>
            </p>
        </footer>
    </div>

    <script>
        const i18n = {
            en: {
                headerDesc: 'A structured process to evaluate market opportunities and drive them to execution.',
                card1Desc: 'Propose a market opportunity. Describe the customer problem, strategic fit, growth impact, and supporting evidence.',
                card1Link: 'Create Submission →',
                card2Desc: 'Evaluate submitted opportunities across 8 weighted criteria including strategic alignment, market size, and customer impact.',
                card2Link: 'Start Scoring →',
                card3Desc: 'Approval for Initiation. Build the solution concept, market analysis, and business case for opportunities that pass scoring.',
                card3Link: 'Open AFI Package →',
                card4Desc: 'Approval for Commercialization. Verify readiness across product, regulatory, sales, marketing, and support before launch.',
                card4Link: 'Open Checklist →',
                footerDesc: 'MOP manages the full lifecycle from opportunity discovery through commercialization.'
            },
            ko: {
                headerDesc: '시장 기회를 체계적으로 평가하고 실행으로 연결하는 MOP 프로세스입니다.',
                card1Desc: '시장 기회를 제안합니다. 고객 문제, 전략적 적합성, 성장 영향 등을 기술하여 제출합니다.',
                card1Link: '제안서 작성하기 →',
                card2Desc: '제출된 기회를 8개 기준으로 평가합니다. 전략 적합성, 시장 규모, 고객 영향도 등을 점수화합니다.',
                card2Link: '평가 시작하기 →',
                card3Desc: 'Approval for Initiation. 평가를 통과한 기회에 대해 솔루션, 시장 분석, 비즈니스 케이스를 작성합니다.',
                card3Link: 'AFI 패키지 작성하기 →',
                card4Desc: 'Approval for Commercialization. 제품, 규제, 영업, 마케팅 등 출시 준비 상태를 점검합니다.',
                card4Link: '체크리스트 확인하기 →',
                footerDesc: 'MOP는 시장 기회 발굴부터 상용화까지의 전 과정을 체계적으로 관리합니다.'
            }
        };

        function setLang(lang) {
            const t = i18n[lang];
            document.getElementById('headerDesc').textContent = t.headerDesc;
            document.getElementById('card1Desc').textContent = t.card1Desc;
            document.getElementById('card1Link').textContent = t.card1Link;
            document.getElementById('card2Desc').textContent = t.card2Desc;
            document.getElementById('card2Link').textContent = t.card2Link;
            document.getElementById('card3Desc').textContent = t.card3Desc;
            document.getElementById('card3Link').textContent = t.card3Link;
            document.getElementById('card4Desc').textContent = t.card4Desc;
            document.getElementById('card4Link').textContent = t.card4Link;
            document.getElementById('footerDesc').textContent = t.footerDesc;

            document.getElementById('langEn').classList.toggle('active', lang === 'en');
            document.getElementById('langKo').classList.toggle('active', lang === 'ko');
        }

        // Default: English
        setLang('en');
    </script>
</body>
</html>
