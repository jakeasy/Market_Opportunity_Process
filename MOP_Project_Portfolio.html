<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Portfolio Board - Medit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        /* Dark scrollbar */
        ::-webkit-scrollbar { width:8px; height:8px; }
        ::-webkit-scrollbar-track { background:#0f1525; }
        ::-webkit-scrollbar-thumb { background:#2a3450; border-radius:4px; }
        ::-webkit-scrollbar-thumb:hover { background:#3b4a6b; }
        * { scrollbar-width:thin; scrollbar-color:#2a3450 #0f1525; }
        :root {
            --primary:#3b82f6; --primary-light:#e8f0ff; --primary-dark:#0039b3;
            --success:#34d399; --success-light:#e8f8ef;
            --warning:#fbbf24; --warning-light:#fef3cd;
            --danger:#ef4444; --danger-light:#fee2e2;
            --gray-50:#0f1525; --gray-100:#111827; --gray-200:#1a2235;
            --gray-300:#cbd5e1; --gray-500:#94a3b8; --gray-700:#f0f2f5; --gray-900:#cbd5e1;
            --radius:12px;
            --shadow:0 2px 8px rgba(0,0,0,0.3);
        }
        body { font-family:'DM Sans',sans-serif; background:#0f1525; color:#f0f2f5; line-height:1.6; }

        .lang-toggle { position:fixed; top:20px; right:24px; z-index:200; display:flex; background:#111827; border:1px solid rgba(255,255,255,0.08); border-radius:20px; overflow:hidden; box-shadow:var(--shadow); }
        .lang-btn { padding:8px 16px; font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:500; border:none; background:transparent; color:#94a3b8; cursor:pointer; transition:all 0.3s; }
        .lang-btn.active { background:var(--primary); color:#fff; }

        .page-header { background:#111827; padding:3rem 2rem; border-bottom:1px solid rgba(255,255,255,0.08); text-align:center; animation:slideDown 0.8s ease-out; }
        @keyframes slideDown { from{transform:translateY(-30px);opacity:0} to{transform:translateY(0);opacity:1} }
        .page-header .medit-brand { font-size:0.875rem; font-weight:500; letter-spacing:1px; text-transform:uppercase; margin-bottom:0.5rem; color:var(--primary); }
        .page-header h1 { font-family:'DM Sans',sans-serif; font-size:2.5rem; font-weight:700; color:#f0f2f5; margin-bottom:0.5rem; letter-spacing:-0.5px; }
        .page-header p { color:#94a3b8; font-size:1rem; max-width:600px; margin:0 auto; }

        /* STATS BAR */
        .stats-bar { max-width:1400px; margin:1.5rem auto 0; padding:0 1.5rem; display:flex; gap:16px; flex-wrap:wrap; }
        .stat-card { background:#111827; border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:14px 20px; flex:1; min-width:140px; box-shadow:var(--shadow); }
        .stat-label { font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:#94a3b8; margin-bottom:4px; }
        .stat-value { font-size:1.6rem; font-weight:700; color:#f0f2f5; }
        .stat-value.blue { color:var(--primary); }
        .stat-value.green { color:var(--success); }
        .stat-value.amber { color:var(--warning); }

        /* TOOLBAR */
        .toolbar { max-width:1400px; margin:1.25rem auto; padding:0 1.5rem; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
        .toolbar-left { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
        .view-toggle { display:flex; background:#111827; border:1px solid rgba(255,255,255,0.08); border-radius:8px; overflow:hidden; }
        .view-btn { padding:7px 14px; font-size:0.82rem; font-weight:600; border:none; background:transparent; color:#94a3b8; cursor:pointer; transition:all 0.2s; }
        .view-btn.active { background:var(--primary); color:#fff; }
        .filter-select { padding:7px 12px; border:1px solid rgba(255,255,255,0.08); border-radius:8px; font-family:inherit; font-size:0.82rem; color:#cbd5e1; background:#1a2235; cursor:pointer; }
        .add-btn { padding:8px 18px; border-radius:8px; font-weight:600; font-size:0.85rem; border:none; background:var(--primary); color:#fff; cursor:pointer; transition:all 0.2s; }
        .add-btn:hover { background:var(--primary-dark); }

        /* ===== DASHBOARD MATRIX ===== */
        .dashboard-container { max-width:1400px; margin:0 auto; padding:1rem 1.5rem 2rem; overflow-x:auto; }
        .dash-title { font-size:1.5rem; font-weight:700; color:#f0f2f5; margin-bottom:1.2rem; padding-bottom:10px; display:inline-block; border-bottom:3px solid rgba(255,255,255,0.15); }
        .matrix-wrap { background:#0d1117; border-radius:var(--radius); box-shadow:0 4px 24px rgba(0,0,0,0.4); overflow:hidden; border:1px solid rgba(255,255,255,0.06); }
        .matrix-table { width:100%; border-collapse:collapse; table-layout:fixed; min-width:900px; }
        .matrix-table th, .matrix-table td { border:1px solid rgba(255,255,255,0.06); vertical-align:top; }

        /* Group header row (Scanning Solution Business, etc.) */
        .matrix-table thead th.group-header {
            background:#1a2235; color:#e2e8f0;
            font-size:0.88rem; font-weight:700; text-align:center;
            padding:14px 10px; letter-spacing:0.3px;
            border-bottom:2px solid rgba(99,102,241,0.3);
        }
        /* Single-span header (Applications, Ortho, eCommerce) */
        .matrix-table thead th.single-header {
            background:#1a2235; color:#e2e8f0;
            font-size:0.85rem; font-weight:600; text-align:center;
            padding:14px 10px;
            border-bottom:2px solid rgba(99,102,241,0.3);
        }
        /* Sub-column header row (Hardware, ML Scan, MLE) */
        .matrix-table thead th.sub-header {
            background:#151d2e; color:#94a3b8;
            font-size:0.8rem; font-weight:600; text-align:center;
            padding:10px 8px;
            border-bottom:2px solid rgba(99,102,241,0.15);
        }
        /* Corner cell */
        .matrix-table thead th.corner {
            background:#1a2235;
        }

        /* Row labels */
        .matrix-table .row-label {
            background:#131b2b;
            font-weight:700; font-size:0.85rem; color:#cbd5e1;
            padding:20px 16px; text-align:center; vertical-align:middle;
            width:170px; min-width:150px;
            border-right:1px solid rgba(255,255,255,0.08);
        }

        /* Data cells */
        .matrix-table td.matrix-cell {
            background:#0d1117; padding:14px 12px; min-height:90px;
            transition:background 0.2s;
        }
        .matrix-table tr:nth-child(even) td.matrix-cell { background:#111827; }
        .matrix-table tr:nth-child(even) .row-label { background:#151d2e; }
        .matrix-table td.matrix-cell:hover { background:rgba(99,102,241,0.08); }

        /* Project items inside cells */
        .matrix-cell .cell-project {
            display:flex; align-items:flex-start; gap:5px;
            margin-bottom:6px; font-size:0.84rem; line-height:1.5;
            padding:4px 6px; border-radius:6px;
            transition:background 0.15s;
            max-width:100%; overflow:hidden;
        }
        .matrix-cell .cell-project:hover { background:rgba(0,79,236,0.06); }
        .cell-project .proj-num { color:var(--primary); font-weight:700; min-width:20px; }
        .cell-project .proj-name { color:#cbd5e1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:100%; display:inline-block; }
        .cell-project .proj-name:hover { color:var(--primary); cursor:pointer; text-decoration:underline; }

        /* BOARD VIEW */
        .board-container { max-width:1400px; margin:0 auto; padding:1rem 1.5rem 2rem; overflow-x:auto; }
        .funding-section { margin-bottom:2rem; }
        .funding-header { display:flex; align-items:center; gap:10px; margin-bottom:1rem; padding:0 4px; }
        .funding-badge { padding:4px 14px; border-radius:20px; font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
        .funding-badge.funded { background:rgba(52,211,153,0.15); color:#34d399; }
        .funding-badge.not-funded { background:#1a2235; color:#94a3b8; }
        .funding-count { font-size:0.82rem; color:#94a3b8; }
        .col-headers { display:grid; grid-template-columns:repeat(var(--col-count,7),1fr); gap:12px; margin-bottom:8px; }
        .col-header { background:#3b82f6; color:#fff; border-radius:8px 8px 0 0; padding:10px 14px; font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; text-align:center; }
        .kanban-row { display:grid; grid-template-columns:repeat(var(--col-count,7),1fr); gap:12px; margin-bottom:2px; min-height:60px; }
        .kanban-cell { background:#111827; border:1px solid rgba(255,255,255,0.08); border-radius:0; padding:8px; min-height:50px; transition:background 0.2s; }
        .kanban-cell.drop-hover { background:var(--primary-light); border-color:var(--primary); }
        .status-labels { display:grid; grid-template-columns:repeat(var(--col-count,7),1fr); gap:12px; }
        .status-label { padding:6px 10px; font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; text-align:center; border-left:1px solid var(--gray-200); border-right:1px solid var(--gray-200); }
        .status-label.todo { background:rgba(251,191,36,0.15); color:#fbbf24; }
        .status-label.inprog { background:rgba(59,130,246,0.15); color:#3b82f6; }
        .status-label.done { background:rgba(52,211,153,0.15); color:#34d399; }

        .project-card { background:#111827; border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:10px 12px; margin-bottom:6px; cursor:grab; box-shadow:var(--shadow); transition:all 0.2s; position:relative; }
        .project-card:hover { box-shadow:0 4px 16px rgba(59,130,246,0.2); transform:translateY(-1px); border-color:rgba(59,130,246,0.5); }
        .project-card.dragging { opacity:0.5; }
        .project-card .pc-title { font-size:0.82rem; font-weight:600; color:#f0f2f5; margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; text-overflow:ellipsis; word-break:break-word; }
        .project-card .pc-id { font-size:0.68rem; color:#94a3b8; margin-bottom:6px; }
        .project-card .pc-meta { display:flex; align-items:center; justify-content:space-between; gap:6px; }
        .pc-priority { display:inline-block; width:8px; height:8px; border-radius:50%; flex-shrink:0; }
        .pc-priority.high { background:var(--danger); }
        .pc-priority.medium { background:var(--warning); }
        .pc-priority.low { background:var(--success); }
        .pc-owner { font-size:0.7rem; color:#94a3b8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .pc-score { font-size:0.68rem; font-weight:700; color:#fff; background:#3b82f6; padding:2px 6px; border-radius:4px; }
        .pc-delete { position:absolute; top:4px; right:6px; font-size:0.7rem; color:#64748b; cursor:pointer; border:none; background:none; padding:2px; line-height:1; }
        .pc-delete:hover { color:var(--danger); }
        .pc-source { display:inline-block; font-size:0.6rem; font-weight:700; padding:1px 6px; border-radius:3px; letter-spacing:0.5px; vertical-align:middle; margin-right:4px; }
        .pc-source.src-mop { background:rgba(139,92,246,0.2); color:#a78bfa; border:1px solid rgba(139,92,246,0.3); }
        .pc-source.src-direct { background:rgba(100,116,139,0.2); color:#94a3b8; border:1px solid rgba(100,116,139,0.3); }
        .pc-afc-info { margin-top:6px; padding:6px 8px; background:rgba(59,130,246,0.08); border:1px solid rgba(59,130,246,0.15); border-radius:6px; font-size:0.68rem; line-height:1.5; }
        .pc-afc-row { display:flex; justify-content:space-between; align-items:center; gap:4px; }
        .pc-afc-row + .pc-afc-row { margin-top:2px; }
        .pc-afc-label { color:#64748b; }
        .pc-afc-val { color:#cbd5e1; font-weight:600; }
        .pc-afc-gate { padding:1px 6px; border-radius:3px; font-size:0.65rem; font-weight:700; text-transform:uppercase; }
        .pc-afc-gate.go { background:rgba(52,211,153,0.2); color:#34d399; }
        .pc-afc-gate.conditional { background:rgba(251,191,36,0.2); color:#fbbf24; }
        .pc-readiness-bar { height:4px; background:rgba(255,255,255,0.08); border-radius:2px; margin-top:3px; overflow:hidden; }
        .pc-readiness-fill { height:100%; border-radius:2px; transition:width 0.3s; }

        /* TABLE VIEW */
        .table-view { max-width:1400px; margin:0 auto; padding:1rem 1.5rem 2rem; display:none; }
        .table-view.active { display:block; }
        .board-container.hidden { display:none; }
        .dashboard-container.hidden { display:none; }
        .tbl-wrap { background:#111827; border-radius:var(--radius); box-shadow:var(--shadow); overflow-x:auto; }
        .tbl { width:100%; border-collapse:collapse; min-width:900px; }
        .tbl th { background:#1a2235; padding:0.75rem 1rem; font-size:0.75rem; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.5px; text-align:left; border-bottom:2px solid rgba(255,255,255,0.08); white-space:nowrap; }
        .tbl td { padding:0.7rem 1rem; font-size:0.85rem; border-bottom:1px solid rgba(255,255,255,0.08); vertical-align:middle; }
        .tbl tr:hover td { background:#1a2235; }
        .tbl .t-title { font-weight:600; color:#f0f2f5; }
        .tbl-status { padding:3px 10px; border-radius:12px; font-size:0.72rem; font-weight:600; display:inline-block; }
        .tbl-status.todo { background:rgba(251,191,36,0.15); color:#fbbf24; }
        .tbl-status.inprog { background:rgba(59,130,246,0.15); color:#3b82f6; }
        .tbl-status.done { background:rgba(52,211,153,0.15); color:#34d399; }
        .tbl-funding { padding:3px 10px; border-radius:12px; font-size:0.72rem; font-weight:600; }
        .tbl-funding.funded { background:rgba(52,211,153,0.15); color:#34d399; }
        .tbl-funding.not-funded { background:#1a2235; color:#94a3b8; }

        /* ADD MODAL */
        .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; }
        .modal-overlay.show { display:flex; }
        .modal-box { background:#111827; border-radius:16px; padding:2rem; max-width:520px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.5); animation:modalIn 0.3s ease-out; max-height:90vh; overflow-y:auto; }
        @keyframes modalIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
        .modal-title { font-size:1.15rem; font-weight:700; color:#f0f2f5; margin-bottom:1.25rem; }
        .form-group { margin-bottom:1rem; }
        .form-label { display:block; font-size:0.78rem; font-weight:600; color:#94a3b8; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.3px; }
        .form-input,.form-select,.form-textarea { width:100%; padding:8px 12px; border:1px solid rgba(255,255,255,0.08); border-radius:8px; font-family:inherit; font-size:0.88rem; color:#cbd5e1; background:#1a2235; }
        .form-select option { background:#1a2235; color:#cbd5e1; }
        .filter-select option { background:#1a2235; color:#cbd5e1; }
        .form-input:focus,.form-select:focus,.form-textarea:focus { outline:none; border-color:#3b82f6; background:#1a2235; }
        .form-select.field-error,.form-input.field-error { border-color:#ef4444; background:rgba(239,68,68,0.1); }
        .field-error-msg { color:#ef4444; font-size:0.75rem; margin-top:2px; display:none; }
        .field-error-msg.show { display:block; }
        .form-textarea { min-height:60px; resize:vertical; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .modal-btns { display:flex; gap:10px; justify-content:flex-end; margin-top:1.5rem; }
        .modal-btn { padding:8px 20px; border-radius:8px; font-weight:600; font-size:0.88rem; border:none; cursor:pointer; }
        .modal-btn.primary { background:var(--primary); color:#fff; }
        .modal-btn.secondary { background:#1a2235; color:#cbd5e1; }

        footer { background:#111827; color:#cbd5e1; padding:2rem; text-align:center; font-size:0.85rem; border-top:1px solid rgba(255,255,255,0.08); }
        footer p { color:#94a3b8; }
        .in-iframe .lang-toggle { display: none !important; }

        /* CHECKLIST MODAL */
        .checklist-overlay { display:none; position:fixed; inset:0; z-index:1500; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); align-items:center; justify-content:center; }
        .checklist-overlay.active { display:flex; }
        .checklist-modal { background:#111827; border:1px solid rgba(255,255,255,0.08); border-radius:16px; width:680px; max-width:95vw; max-height:85vh; overflow-y:auto; box-shadow:0 24px 64px rgba(0,0,0,0.5); }
        .checklist-modal-header { padding:24px 28px 16px; border-bottom:1px solid rgba(255,255,255,0.06); position:sticky; top:0; background:#111827; z-index:2; }
        .checklist-modal-header h3 { font-size:1.1rem; font-weight:700; color:#f0f2f5; margin-bottom:4px; }
        .checklist-modal-header .cl-progress { font-size:0.8rem; color:#94a3b8; }
        .checklist-modal-header .cl-progress strong { color:#3b82f6; }
        .checklist-modal-body { padding:12px 28px 24px; }
        .cl-section { margin-bottom:16px; }
        .cl-section-title { font-size:0.85rem; font-weight:700; color:#e2e8f0; padding:8px 0 6px; border-bottom:1px solid rgba(255,255,255,0.06); margin-bottom:8px; }
        .cl-item { display:flex; align-items:flex-start; gap:10px; padding:7px 4px; cursor:pointer; border-radius:6px; transition:background 0.15s; position:relative; }
        .cl-date { margin-left:auto; flex-shrink:0; font-size:0.7rem; font-family:'JetBrains Mono',monospace; color:#64748b; background:rgba(255,255,255,0.05); padding:2px 8px; border-radius:4px; white-space:nowrap; align-self:center; }
        .cl-item:hover { background:rgba(255,255,255,0.03); }
        .cl-item input[type=checkbox] { margin-top:3px; accent-color:#3b82f6; width:16px; height:16px; cursor:pointer; }
        .cl-item label { font-size:0.82rem; color:#cbd5e1; cursor:pointer; line-height:1.5; }
        .cl-item.checked label { color:#64748b; text-decoration:line-through; }
        .checklist-modal-footer { padding:16px 28px; border-top:1px solid rgba(255,255,255,0.06); text-align:right; position:sticky; bottom:0; background:#111827; }
        .cl-close-btn { padding:9px 24px; border-radius:8px; border:none; background:#3b82f6; color:#fff; font-weight:600; font-size:0.85rem; cursor:pointer; }
        .cl-close-btn:hover { background:#2d66d6; }
        .cl-bar { height:4px; border-radius:2px; background:rgba(255,255,255,0.06); margin-top:6px; }
        .cl-bar-fill { height:100%; border-radius:2px; background:#3b82f6; transition:width 0.3s; }
        .kanban-cl-btn { font-size:0.72rem; padding:3px 8px; border-radius:6px; border:1px solid rgba(255,255,255,0.08); background:rgba(59,130,246,0.08); color:#60a5fa; cursor:pointer; margin-top:6px; display:inline-block; }
        .kanban-cl-btn:hover { background:rgba(59,130,246,0.15); }
        .kanban-cl-wrap { margin-top:6px; }
        .kanban-cl-bar { height:4px; border-radius:2px; background:rgba(255,255,255,0.06); margin-top:4px; overflow:hidden; }
        .kanban-cl-bar-fill { height:100%; border-radius:2px; transition:width 0.3s; }
        .kanban-cl-pct { font-size:0.65rem; color:#94a3b8; margin-left:6px; }
        .pc-afc-decision { font-size:0.62rem; color:#94a3b8; margin-top:2px; }
    </style>
</head>
<body>

<div class="lang-toggle">
    <button class="lang-btn active" id="langEn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="langKo" onclick="setLang('ko')">한국어</button>
</div>

<div class="page-header">
    <div class="medit-brand">Medit Digital Solutions</div>
    <h1 data-i18n="title">Project Portfolio Board</h1>
    <p data-i18n="subtitle">Funded and pipeline project overview across product categories</p>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="toolbar">
    <div class="toolbar-left">
        <div class="view-toggle">
            <button class="view-btn active" id="vDashboard" onclick="setView('dashboard')" data-i18n="vDashboard">Dashboard</button>
            <button class="view-btn" id="vBoard" onclick="setView('board')" data-i18n="vBoard">Board</button>
            <button class="view-btn" id="vTable" onclick="setView('table')" data-i18n="vTable">Table</button>
        </div>
        <select class="filter-select" id="filterCat" onchange="renderAll()">
            <option value="all" data-i18n="filterAll">All Categories</option>
        </select>
        <select class="filter-select" id="filterStatus" onchange="renderAll()">
            <option value="all" data-i18n="filterAllStatus">All Status</option>
            <option value="todo">To Do</option>
            <option value="inprog">In Progress</option>
            <option value="done">Done</option>
        </select>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
        <button class="add-btn" onclick="openAddModal()" data-i18n="btnAdd">+ Add Project</button>
        <button class="add-btn" onclick="printCurrentView()" style="background:transparent;border:1px solid rgba(255,255,255,0.15);color:#94a3b8">🖨️ Print</button>
    </div>
</div>

<div class="dashboard-container" id="dashboardView"></div>
<div class="board-container hidden" id="boardView"></div>
<div class="table-view" id="tableView"></div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="addModal">
    <div class="modal-box">

function populateCatFilter(){
    var sel=document.getElementById('filterCat');
    var val=sel.value;
    sel.innerHTML='<option value="all">'+t('filterAll')+'</option>';
    categories.forEach(function(c){sel.innerHTML+='<option value="'+c.key+'">'+c[currentLang]+'</option>';});
    sel.value=val||'all';
}
function populateCatSelect(){
    var sel=document.getElementById('fCategory');
    sel.innerHTML='<option value="" disabled selected>-- Select --</option>';
    categoryGroups.forEach(function(g){
        if(g.group){
            var og=document.createElement('optgroup');
            og.label=g.group[currentLang];
            g.cats.forEach(function(c){
                var opt=document.createElement('option');
                opt.value=c.key; opt.textContent=c[currentLang];
                og.appendChild(opt);
            });
            sel.appendChild(og);
        } else {
            g.cats.forEach(function(c){
                var opt=document.createElement('option');
                opt.value=c.key; opt.textContent=c[currentLang];
                sel.appendChild(opt);
            });
        }
    });
}
function populateImpactSelect(){
    var sel=document.getElementById('fImpact');

    sel.innerHTML='<option value="" disabled selected>-- Select --</option>';
    impactTypes.forEach(function(m){sel.innerHTML+='<option value="'+m.key+'">'+m[currentLang]+'</option>';});
    if(val) sel.value=val;
}

function getFiltered(){
    var catF=document.getElementById('filterCat').value;
    var statusF=document.getElementById('filterStatus').value;
    return projects.filter(function(p){
        if(catF!=='all'&&p.category!==catF)return false;
        if(statusF!=='all'&&p.status!==statusF)return false;
        return true;
    });
}

// Drag & Drop
var dragId=null;
function dragstart(e){if(_guestMode){e.preventDefault();return;}dragId=parseInt(e.target.getAttribute('data-id'));e.target.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dragover(e){e.preventDefault();e.currentTarget.classList.add('drop-hover');}
function dragleave(e){e.currentTarget.classList.remove('drop-hover');}
function drop(e){
    e.preventDefault();e.currentTarget.classList.remove('drop-hover');
    if(!dragId)return;
    var cell=e.currentTarget;
    var p=projects.find(function(x){return x.id===dragId;});
    if(p){
        p.funding=cell.getAttribute('data-fund');
        p.category=cell.getAttribute('data-cat');
        p.status=cell.getAttribute('data-status');
        p.updated=new Date().toISOString();
        renderAll();
    }
    dragId=null;
}

function editProject(id){

    editId=id;
    document.getElementById('modalFormTitle').textContent=t('editTitle');

function closeAddModal(){document.getElementById('addModal').classList.remove('show');clearFieldErrors();}
function clearFieldErrors(){
    ['fCategory','fImpact','fStatus','fFunding','fPriority','fName'].forEach(function(id){
        document.getElementById(id).classList.remove('field-error');
    });
    ['errCategory','errImpact','errStatus','errFunding','errPriority'].forEach(function(id){
        var el=document.getElementById(id);if(el){el.classList.remove('show');el.textContent='';}
    });
}
function saveProject(){
    clearFieldErrors();
    var name=document.getElementById('fName').value.trim();
    var cat=document.getElementById('fCategory').value;
    var impact=document.getElementById('fImpact').value;
    var st=document.getElementById('fStatus').value;
    var fund=document.getElementById('fFunding').value;
    var pri=document.getElementById('fPriority').value;
    var isKo=currentLang==='ko';
    var hasError=false;
    var fieldChecks=[
        {id:'fName',errId:null,val:name,label:isKo?'프로젝트명':'Project Name'},
        {id:'fCategory',errId:'errCategory',val:cat,label:isKo?'카테고리':'Category'},
        {id:'fImpact',errId:'errImpact',val:impact,label:'Impact Type'},
        {id:'fStatus',errId:'errStatus',val:st,label:isKo?'상태':'Status'},
        {id:'fFunding',errId:'errFunding',val:fund,label:isKo?'펀딩':'Funding'},
        {id:'fPriority',errId:'errPriority',val:pri,label:isKo?'우선순위':'Priority'}
    ];
    fieldChecks.forEach(function(f){
        if(!f.val){
            hasError=true;
            document.getElementById(f.id).classList.add('field-error');
            if(f.errId){
                var errEl=document.getElementById(f.errId);
                errEl.textContent=isKo?(f.label+'을(를) 선택해주세요'):(f.label+' is required');
                errEl.classList.add('show');
            }
        }
    });
    if(hasError){
        var first=fieldChecks.find(function(f){return !f.val;});
        if(first)document.getElementById(first.id).focus();
        return;
    }
    var data={
        name:name,
        category:cat,
        impactType:impact,
        status:st,
        funding:fund,
        priority:pri,
        owner:document.getElementById('fOwner').value.trim(),
        targetDate:document.getElementById('fTargetDate').value||'',
        mopId:document.getElementById('fMopId').value.trim(),
        notes:document.getElementById('fNotes').value.trim()
    };
    if(editId){
        var p=projects.find(function(x){return x.id===editId;});
        if(p){
            var savedChecklist=p.checklist||{};
            var savedScore=p.score;
            var savedAfc={autoAdded:p.autoAdded,afcGate:p.afcGate,afcReadiness:p.afcReadiness,afcYesCount:p.afcYesCount,afcNoCount:p.afcNoCount,afcFinalizedDate:p.afcFinalizedDate,afcGateNotes:p.afcGateNotes,reviewScore:p.reviewScore,reviewMaxScore:p.reviewMaxScore,reviewPercentage:p.reviewPercentage,reviewer:p.reviewer,reviewDate:p.reviewDate,region:p.region,submitter:p.submitter};
            Object.assign(p,data);
            p.checklist=savedChecklist;
            if(savedScore) p.score=savedScore;
            Object.keys(savedAfc).forEach(function(k){if(savedAfc[k]!==undefined&&savedAfc[k]!==null&&savedAfc[k]!=='')p[k]=savedAfc[k];});
            p.updated=new Date().toISOString();
        }
    } else {
        data.id=nextId++;
        data.created=new Date().toISOString();
        data.updated=new Date().toISOString();
        projects.push(data);
    }
    closeAddModal();renderAll();
}

var _allReviews=[];
function openScoringReview(mopId){
    var review=_allReviews.find(function(r){return String(r.id)===String(mopId)||String(r.submissionId)===String(mopId);});
    if(!review){
        try{if(window.parent!==window) window.parent.postMessage({type:'mop-request-review-data',mopId:mopId},__MOP_SEC.targetOrigin());} catch(e) { try { __MOP_SEC.logErr('Portfolio', e); } catch(_){} }
        return;
    }
    showReviewResultPopup(review);
}
function showReviewResultPopup(r){
    var isKo=currentLang==='ko';
    document.getElementById('rrTitle').textContent=r.title||'Untitled';
    document.getElementById('rrMeta').innerHTML=(isKo?'평가자: ':'Reviewer: ')+'<strong style="color:#e2e8f0">'+esc(r.reviewer||'-')+'</strong> · '+(r.date||'');
    var score=r.score||0,maxScore=r.maxScore||100,pct=r.percentage||Math.round(score/maxScore*100);
    var sc=pct>=80?'#10b981':pct>=60?'#34d399':pct>=40?'#fbbf24':'#ef4444';
    document.getElementById('rrScoreBig').textContent=score;
    document.getElementById('rrScoreBig').style.color=sc;
    document.getElementById('rrScoreMax').textContent='/ '+maxScore+'  ('+pct+'%)';
    var gf=document.getElementById('rrGaugeFill');
    gf.style.width=pct+'%';gf.style.background='linear-gradient(90deg,'+sc+','+sc+'cc)';
    var recText=pct>=80?(isKo?'✅ 강력 추천':'✅ Strongly Recommended'):pct>=60?(isKo?'👍 추천':'👍 Recommended'):pct>=40?(isKo?'⚠️ 조건부 추천':'⚠️ Conditionally Recommended'):(isKo?'❌ 비추천':'❌ Not Recommended');
    var recColor=pct>=80?'#10b981':pct>=60?'#34d399':pct>=40?'#fbbf24':'#ef4444';
    document.getElementById('rrRec').innerHTML='<span style="color:'+recColor+'">'+recText+'</span>';
    var bh='';
    var scores=r.criteriaScores||r.scores||{};
    Object.keys(scores).forEach(function(k){
        var s=scores[k]||0;var bp=Math.round(s/5*100);
        var bc=bp>=80?'#10b981':bp>=60?'#34d399':bp>=40?'#fbbf24':'#ef4444';
        bh+='<div style="display:flex;align-items:center;gap:10px">';
        bh+='<span style="flex:0 0 140px;font-size:0.75rem;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+k+'</span>';
        bh+='<div style="flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden"><div style="height:100%;width:'+bp+'%;background:'+bc+';border-radius:3px"></div></div>';
        bh+='<span style="flex:0 0 30px;text-align:right;font-size:0.75rem;font-weight:700;color:'+bc+'">'+s+'/5</span>';
        bh+='</div>';
    });
    document.getElementById('rrBreakdown').innerHTML=bh;
    document.getElementById('reviewResultModal').classList.add('show');
}
function closeReviewResult(){document.getElementById('reviewResultModal').classList.remove('show');}

function getClPct(p){
    if(!p.checklist) return 0;
    var total=0,checked=0;
    readinessChecklist.forEach(function(sec){sec.items.forEach(function(it){total++;if(p.checklist[it])checked++;});});
    return total>0?Math.round(checked/total*100):0;
}
function gateDecisionText(gate,isKo){

// Readiness Checklist
var checklistProjectId = null;

function openChecklist(id) {
    var p = projects.find(function(x){return x.id===id;});
    if (!p) return;
    checklistProjectId = id;
    if (!p.checklist) p.checklist = {};

    document.getElementById('clTitle').textContent = p.name + ' — Readiness Checklist';
    var body = document.getElementById('clBody');
    var html = '';
    var total = 0, checked = 0;

    // Migrate old boolean true values to date strings
    Object.keys(p.checklist).forEach(function(k){
        if(p.checklist[k]===true) p.checklist[k]=new Date().toISOString();
    });

    readinessChecklist.forEach(function(sec) {
        html += '<div class="cl-section"><div class="cl-section-title">' + sec.icon + ' ' + sec.category + '</div>';
        sec.items.forEach(function(item) {
            total++;
            var val = p.checklist[item];
            var isChecked = !!val;
            if (isChecked) checked++;
            var dateStr = '';
            if (isChecked && typeof val === 'string') {
                try { var d = new Date(val); dateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); } catch(e) { try { __MOP_SEC.logErr('Portfolio', e); } catch(_){} }
            }
            if(_guestMode){
                html += '<div class="cl-item' + (isChecked ? ' checked' : '') + '" style="cursor:default;opacity:0.85">'
                    + '<input type="checkbox"' + (isChecked ? ' checked' : '') + ' disabled style="pointer-events:none">'
                    + '<label>' + item + '</label>'
                    + (dateStr ? '<span class="cl-date">' + dateStr + '</span>' : '')
                    + '</div>';
            } else {
                html += '<div class="cl-item' + (isChecked ? ' checked' : '') + '" onclick="toggleClItem(this, \'' + item.replace(/'/g, "\\'") + '\')">'
                    + '<input type="checkbox"' + (isChecked ? ' checked' : '') + ' onclick="event.stopPropagation();toggleClItem(this.parentElement, \'' + item.replace(/'/g, "\\'") + '\')">'
                    + '<label>' + item + '</label>'
                    + (dateStr ? '<span class="cl-date">' + dateStr + '</span>' : '')
                    + '</div>';
            }
        });
        html += '</div>';
    });

    body.innerHTML = html;
    updateClProgress(checked, total);
    document.getElementById('checklistOverlay').classList.add('active');
}

function toggleClItem(el, item) {
    if(_guestMode) return;
    var p = projects.find(function(x){return x.id===checklistProjectId;});
    if (!p) return;
    if (!p.checklist) p.checklist = {};
    var wasChecked = !!p.checklist[item];
    p.checklist[item] = wasChecked ? false : new Date().toISOString();

    var cb = el.querySelector('input[type=checkbox]');
    cb.checked = !!p.checklist[item];
    el.classList.toggle('checked', !!p.checklist[item]);

    // Update date display
    var dateEl = el.querySelector('.cl-date');
    if (!wasChecked && p.checklist[item]) {
        if (!dateEl) { dateEl = document.createElement('span'); dateEl.className = 'cl-date'; el.appendChild(dateEl); }
        var d = new Date(p.checklist[item]);
        dateEl.textContent = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    } else if (dateEl) { dateEl.remove(); }

    // Recalculate progress
    var total = 0, checked = 0;
    readinessChecklist.forEach(function(sec) {
        sec.items.forEach(function(it) { total++; if (p.checklist[it]) checked++; });
    });
    updateClProgress(checked, total);
    p.updated = new Date().toISOString();
    saveState();
}

function updateClProgress(checked, total) {
    document.getElementById('clChecked').textContent = checked;
    document.getElementById('clTotal').textContent = total;
    var pct = total > 0 ? Math.round(checked / total * 100) : 0;
    document.getElementById('clPct').textContent = pct + '%';
    document.getElementById('clBarFill').style.width = pct + '%';
}

function openPrintWindow(html){
    var w=window.open('','_blank','width=1000,height=700');
    if(w){w.document.write(html);w.document.close();return;}
    // Fallback: use hidden iframe for print
    var oldFrame=document.getElementById('_printFrame');
    if(oldFrame)oldFrame.remove();
    var f=document.createElement('iframe');
    f.id='_printFrame';
    f.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;border:none;background:#fff';
    document.body.appendChild(f);
    f.contentDocument.write(html+'<script>document.addEventListener("keydown",function(e){if(e.key==="Escape")parent.document.getElementById("_printFrame").remove();});<\/script>');
    f.contentDocument.close();
}

        html+='<td style="white-space:nowrap">'+targetHtml+'</td>';

// State persistence via postMessage + localStorage
function saveState(){
    try{
        var payload={projects:projects,nextId:nextId};
        if(window.parent!==window)window.parent.postMessage({type:'mop-portfolio-state-save',payload:payload},__MOP_SEC.targetOrigin());
        try{localStorage.setItem('mop_portfolio_state',JSON.stringify(payload));} catch(e) { try { __MOP_SEC.logErr('Portfolio', e); } catch(_){} }
    } catch(e) { try { __MOP_SEC.logErr('Portfolio', e); } catch(_){} }
}
function loadLocalState(){
    try{
        var saved=localStorage.getItem('mop_portfolio_state');
        if(saved){
            var p=JSON.parse(saved);
            if(p.projects&&p.projects.length){
                projects=p.projects;
                projects.forEach(function(proj){if(!proj.checklist)proj.checklist={};});
                nextId=p.nextId||projects.length+1;
                return true;
            }
        }
    } catch(e) { try { __MOP_SEC.logErr('Portfolio', e); } catch(_){} }
    return false;
}
window.addEventListener('message',function(e){if(!__MOP_SEC.isAllowedEvent(e))return;
    if(!e.data)return;
    // Detect iframe via Gateway messages (reliable for Blob URL context)
    if(e.data.type&&e.data.type.indexOf('mop-')===0&&!document.documentElement.classList.contains('in-iframe')){
        document.documentElement.classList.add('in-iframe');
    }
    if(e.data.type==='mop-lang-sync'){var l=e.data.lang;if((l==='en'||l==='ko')&&l!==currentLang){_langFromSync=true;setLang(l);}}
    if(e.data.type==='mop-portfolio-set-view'&&e.data.view){setView(e.data.view);}
    if(e.data.type==='mop-portfolio-guest-mode'){enableGuestMode();}
    if(e.data.type==='mop-reviews-sync'){_allReviews=e.data.payload||[];}
    if(e.data.type==='mop-review-data-response'&&e.data.payload){showReviewResultPopup(e.data.payload);}
    if(e.data.type==='mop-portfolio-state-restore'&&e.data.payload){
        var p=e.data.payload;
        if(p.projects){
            projects=p.projects;
            projects.forEach(function(proj){if(!proj.checklist)proj.checklist={};});
            nextId=p.nextId||projects.length+1;
            renderAll();
        }
    }
    // Receive finalized AFI project to auto-add
    if(e.data.type==='mop-portfolio-add-project'&&e.data.payload){
        var np=e.data.payload;
        var exists=projects.find(function(p){return p.mopId&&p.mopId===np.mopId;});
        if(!exists){
            var proj={
                id:nextId++,
                name:np.name||'Untitled',
                category:np.category||'',
                impactType:np.impactType||'',
                status:np.status||'todo',
                funding:np.funding||'funded',
                priority:np.priority||'high',
                autoAdded:np.autoAdded||false,
                afcGate:np.afcGate||'',
                afcReadiness:np.afcReadiness||0,
                afcYesCount:np.afcYesCount||0,
                afcNoCount:np.afcNoCount||0,
                afcFinalizedDate:np.afcFinalizedDate||'',
                afcGateNotes:np.afcGateNotes||'',
                reviewScore:np.reviewScore||0,
                reviewMaxScore:np.reviewMaxScore||0,
                reviewPercentage:np.reviewPercentage||0,
                reviewer:np.reviewer||'',
                reviewDate:np.reviewDate||'',
                region:np.region||'',
                submitter:np.submitter||'',
                owner:np.owner||'',
                mopId:np.mopId||'',
                notes:np.notes||'',
                checklist:{},
                created:new Date().toISOString(),
                updated:new Date().toISOString(),
                autoAdded:true
            };
            projects.push(proj);
            renderAll();
            saveState();
            var isKo=currentLang==='ko';
            setTimeout(function(){
                editProject(proj.id);
                alert(isKo
                    ?'✅ "'+proj.name+'" 프로젝트가 자동 추가되었습니다.\n카테고리와 Impact Type을 선택해주세요.'
                    :'✅ "'+proj.name+'" has been auto-added.\nPlease select a category and impact type.');
            },400);
        }
    }
});

loadLocalState();
populateCatFilter();populateCatSelect();populateImpactSelect();renderAll();

// Signal parent that Portfolio is ready to receive data
try{if(window.parent!==window)window.parent.postMessage({type:'mop-portfolio-ready'},__MOP_SEC.targetOrigin());} catch(e) { try { __MOP_SEC.logErr('Portfolio', e); } catch(_){} }
</script>
